<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>🀄 Маджонг</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg-top: #1a472a;
      --bg-bottom: #2d5a3f;
      --panel-bg: rgba(255, 255, 255, 0.16);
      --panel-border: #ffd700;
      --title-color: #ffd700;
      --text-light: #ffffff;
      --text-dark: #1a472a;
      --board-bg: #2d5a3f;
      --board-border: #8b4513;
      --tile-border: #d4c4a8;
      --tile-front-1: #fffef8;
      --tile-front-2: #f5ebd8;
      --tile-shadow-1: rgba(0, 0, 0, 0.42);
      --tile-shadow-2: rgba(0, 0, 0, 0.28);
      --tile-highlight: rgba(255, 255, 255, 0.92);
      --selected-1: #ffd700;
      --selected-2: #ffaa00;
      --selected-border: #ff6600;
      --hint-color: #00ff66;
      --modal-bg-1: #1a472a;
      --modal-bg-2: #2d5a3f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: calc(env(safe-area-inset-top, 0px) + 8px) 8px calc(env(safe-area-inset-bottom, 0px) + 10px);
      color: var(--text-light);
    }

    .game-header {
      width: 100%;
      text-align: center;
      margin-bottom: 8px;
    }

    .title {
      font-size: 28px;
      line-height: 1.1;
      font-weight: 900;
      color: var(--title-color);
      text-shadow: 0 3px 8px rgba(0, 0, 0, 0.65);
      letter-spacing: 0.4px;
    }

    .stats {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: nowrap;
    }

    .stat-box {
      min-width: 82px;
      padding: 10px 12px;
      text-align: center;
      border-radius: 12px;
      background: var(--panel-bg);
      border: 3px solid var(--panel-border);
      backdrop-filter: blur(3px);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
    }

    .stat-label {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.88);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 21px;
      font-weight: 900;
      color: var(--title-color);
    }

    .game-board {
      position: relative;
      width: 100%;
      max-width: 420px;
      height: 580px;
      border-radius: 14px;
      border: 4px solid var(--board-border);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 28%),
        linear-gradient(180deg, #2f6547 0%, #27543b 100%);
      box-shadow:
        0 12px 34px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255,255,255,0.12);
      padding: 12px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .tile {
      position: absolute;
      width: 54px;
      height: 72px;
      border-radius: 11px;
      border: 3px solid var(--tile-border);
      background: linear-gradient(145deg, var(--tile-front-1) 0%, var(--tile-front-2) 100%);
      box-shadow:
        0 3px 6px var(--tile-shadow-1),
        0 7px 14px var(--tile-shadow-2),
        inset 0 2px 4px var(--tile-highlight);
      overflow: hidden;
      cursor: pointer;
      transition:
        transform 0.15s ease,
        filter 0.15s ease,
        box-shadow 0.15s ease,
        opacity 0.25s ease;
      transform-origin: center center;
    }

    .tile::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 8px;
      pointer-events: none;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.55);
    }

    .tile-face {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1px;
    }

    .tile-symbol {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1;
      font-size: 47px;
      font-weight: 900;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      font-family:
        "Noto Color Emoji",
        "Apple Color Emoji",
        "Segoe UI Emoji",
        "Segoe UI Symbol",
        sans-serif;
      filter: saturate(1.12) contrast(1.04);
      transform: translateY(-1px);
      pointer-events: none;
    }

    .tile-type-bamboo {
      color: #12753b;
    }

    .tile-type-character {
      color: #1e1e1e;
    }

    .tile-type-circle {
      color: #c61f1f;
    }

    .tile-type-dragon {
      color: #cf1d1d;
    }

    .tile-type-wind {
      color: #183d9e;
    }

    .tile-type-flower {
      color: #7b1fa2;
    }

    .tile.free {
      filter: brightness(1);
    }

    .tile.blocked {
      filter: brightness(0.42) saturate(0.82);
      cursor: not-allowed;
    }

    .tile.selected {
      background: linear-gradient(145deg, var(--selected-1) 0%, var(--selected-2) 100%);
      border: 4px solid var(--selected-border);
      box-shadow:
        0 0 18px rgba(255, 215, 0, 0.9),
        0 0 32px rgba(255, 170, 0, 0.65),
        0 8px 14px rgba(0, 0, 0, 0.32);
      transform: scale(1.08);
    }

    .tile.hint {
      border: 4px solid var(--hint-color);
      box-shadow:
        0 0 16px rgba(0, 255, 102, 0.95),
        0 0 30px rgba(0, 255, 102, 0.55),
        0 8px 14px rgba(0, 0, 0, 0.28);
      animation: hintPulse 0.7s ease-in-out infinite;
    }

    .tile.matched {
      opacity: 0;
      transform: scale(0.6);
      pointer-events: none;
    }

    @keyframes hintPulse {
      0%, 100% {
        transform: scale(1.04);
      }
      50% {
        transform: scale(1.1);
      }
    }

    .controls {
      width: 100%;
      max-width: 420px;
      display: flex;
      gap: 8px;
      margin-top: 12px;
      z-index: 10;
    }

    .btn {
      flex: 1;
      min-width: 100px;
      padding: 14px 12px;
      border: none;
      border-radius: 11px;
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: linear-gradient(145deg, #ffd700 0%, #ffaa00 100%);
      color: var(--text-dark);
    }

    .btn-secondary {
      background: linear-gradient(145deg, #8b4513 0%, #654321 100%);
      color: #fff;
    }

    .hints {
      margin-top: 8px;
      text-align: center;
      font-size: 12px;
      opacity: 0.9;
      color: rgba(255, 255, 255, 0.95);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(0, 0, 0, 0.9);
      z-index: 2000;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      width: 100%;
      max-width: 360px;
      padding: 28px 22px;
      text-align: center;
      border-radius: 16px;
      border: 4px solid #ffd700;
      background: linear-gradient(145deg, var(--modal-bg-1) 0%, var(--modal-bg-2) 100%);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.45);
    }

    .modal-title {
      margin-bottom: 14px;
      font-size: 30px;
      font-weight: 900;
      color: #ffd700;
    }

    .modal-text {
      margin-bottom: 14px;
      font-size: 18px;
      color: #fff;
    }

    @media (max-width: 390px) {
      .title {
        font-size: 26px;
      }

      .game-board {
        max-width: 372px;
        height: 545px;
      }

      .tile {
        width: 50px;
        height: 68px;
      }

      .tile-symbol {
        font-size: 43px;
      }

      .stat-box {
        min-width: 74px;
        padding: 10px 10px;
      }

      .stat-value {
        font-size: 19px;
      }

      .btn {
        font-size: 12px;
        padding: 13px 10px;
      }
    }

    @media (max-width: 350px) {
      .game-board {
        max-width: 332px;
        height: 500px;
      }

      .tile {
        width: 46px;
        height: 64px;
      }

      .tile-symbol {
        font-size: 39px;
      }

      .stats {
        gap: 6px;
      }

      .stat-box {
        min-width: 68px;
        padding: 8px;
      }

      .stat-label {
        font-size: 10px;
      }

      .stat-value {
        font-size: 18px;
      }
    }

    @media (min-width: 430px) {
      .game-board {
        max-width: 460px;
        height: 620px;
      }

      .tile {
        width: 58px;
        height: 76px;
      }

      .tile-symbol {
        font-size: 50px;
      }
    }
  </style>
</head>
<body>
  <div class="game-header">
    <h1 class="title">🀄 Маджонг</h1>
  </div>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-label">Счёт</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Пары</div>
      <div class="stat-value" id="pairs">0/0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Время</div>
      <div class="stat-value" id="timer">00:00</div>
    </div>
  </div>

  <div class="game-board" id="board"></div>

  <div class="controls">
    <button class="btn btn-primary" id="shuffleBtn" type="button">Перемешать</button>
    <button class="btn btn-secondary" id="resetBtn" type="button">Новая игра</button>
    <button class="btn btn-secondary" id="hintBtn" type="button">Подсказка</button>
  </div>

  <div class="hints">Нажмите на две одинаковые свободные плитки</div>

  <div class="modal" id="winModal">
    <div class="modal-content">
      <div class="modal-title">🎉 Победа!</div>
      <div class="modal-text">Вы очистили все плитки!</div>
      <div class="modal-text">Счёт: <span id="finalScore">0</span></div>
      <div class="modal-text">Время: <span id="finalTime">00:00</span></div>
      <button class="btn btn-primary" id="playAgainBtn" type="button">Играть снова</button>
    </div>
  </div>

  <div class="modal" id="noMovesModal">
    <div class="modal-content">
      <div class="modal-title">⚠️ Нет ходов!</div>
      <div class="modal-text">Доступных пар не осталось</div>
      <button class="btn btn-primary" id="modalShuffleBtn" type="button">Перемешать</button>
    </div>
  </div>

  <script>
    (function () {
      var tg = null;
      var hasTelegram = false;

      if (window.Telegram && window.Telegram.WebApp) {
        tg = window.Telegram.WebApp;
        hasTelegram = true;
      }

      if (hasTelegram) {
        tg.ready();
        tg.expand();

        if (tg.colorScheme === "light") {
          document.documentElement.style.setProperty("--bg-top", "#dfece0");
          document.documentElement.style.setProperty("--bg-bottom", "#cadcc9");
          document.documentElement.style.setProperty("--panel-bg", "rgba(255,255,255,0.32)");
          document.documentElement.style.setProperty("--text-light", "#ffffff");
          document.documentElement.style.setProperty("--board-bg", "#35684b");
        }

        tg.MainButton.setText("🎮 ИГРАТЬ СНОВА");
        tg.MainButton.setParams({
          color: "#2d5a3f",
          text_color: "#ffd700"
        });
        tg.MainButton.hide();
      }

      var board = document.getElementById("board");
      var scoreEl = document.getElementById("score");
      var pairsEl = document.getElementById("pairs");
      var timerEl = document.getElementById("timer");
      var winModal = document.getElementById("winModal");
      var noMovesModal = document.getElementById("noMovesModal");
      var finalScoreEl = document.getElementById("finalScore");
      var finalTimeEl = document.getElementById("finalTime");

      var tileSymbols = [
        { symbol: "🀀", type: "wind" }, { symbol: "🀁", type: "wind" },
        { symbol: "🀂", type: "wind" }, { symbol: "🀃", type: "wind" },
        { symbol: "🀄", type: "dragon" }, { symbol: "🀅", type: "dragon" },
        { symbol: "🀆", type: "dragon" },
        { symbol: "🀇", type: "character" }, { symbol: "🀈", type: "character" },
        { symbol: "🀉", type: "character" }, { symbol: "🀊", type: "character" },
        { symbol: "🀋", type: "character" }, { symbol: "🀌", type: "character" },
        { symbol: "🀍", type: "character" }, { symbol: "🀎", type: "character" },
        { symbol: "🀏", type: "character" },
        { symbol: "🀐", type: "bamboo" }, { symbol: "🀑", type: "bamboo" },
        { symbol: "🀒", type: "bamboo" }, { symbol: "🀓", type: "bamboo" },
        { symbol: "🀔", type: "bamboo" }, { symbol: "🀕", type: "bamboo" },
        { symbol: "🀖", type: "bamboo" }, { symbol: "🀗", type: "bamboo" },
        { symbol: "🀘", type: "bamboo" },
        { symbol: "🀙", type: "circle" }, { symbol: "🀚", type: "circle" },
        { symbol: "🀛", type: "circle" }, { symbol: "🀜", type: "circle" },
        { symbol: "🀝", type: "circle" }, { symbol: "🀞", type: "circle" },
        { symbol: "🀟", type: "circle" }, { symbol: "🀠", type: "circle" },
        { symbol: "🀡", type: "circle" }
      ];

      var tiles = [];
      var selectedTile = null;
      var score = 0;
      var pairs = 0;
      var totalPairs = 0;
      var gameStartTime = 0;
      var timerInterval = null;
      var gameSessionId = 0;

      var tileWidth = 54;
      var tileHeight = 72;
      var tileStepX = 56;
      var tileStepY = 74;
      var padding = 12;

      function syncDimensions() {
        var width = window.innerWidth || document.documentElement.clientWidth;

        if (width <= 350) {
          tileWidth = 46;
          tileHeight = 64;
          tileStepX = 48;
          tileStepY = 66;
        } else if (width <= 390) {
          tileWidth = 50;
          tileHeight = 68;
          tileStepX = 52;
          tileStepY = 70;
        } else if (width >= 430) {
          tileWidth = 58;
          tileHeight = 76;
          tileStepX = 60;
          tileStepY = 78;
        } else {
          tileWidth = 54;
          tileHeight = 72;
          tileStepX = 56;
          tileStepY = 74;
        }
      }

      function impact(type) {
        if (hasTelegram && tg.HapticFeedback && tg.HapticFeedback.impactOccurred) {
          tg.HapticFeedback.impactOccurred(type);
        }
      }

      function notify(type) {
        if (hasTelegram && tg.HapticFeedback && tg.HapticFeedback.notificationOccurred) {
          tg.HapticFeedback.notificationOccurred(type);
        }
      }

      function getTileHTML(symbol, type) {
        return (
          '<div class="tile-face">' +
            '<div class="tile-symbol tile-type-' + type + '">' + symbol + "</div>" +
          "</div>"
        );
      }

      function getTilePositions() {
        var positions = [];
        var row;
        var col;

        for (row = 0; row < 6; row++) {
          for (col = 0; col < 7; col++) {
            positions.push({
              x: padding + col * tileStepX,
              y: padding + row * tileStepY,
              z: 0
            });
          }
        }

        for (row = 0; row < 5; row++) {
          for (col = 0; col < 6; col++) {
            positions.push({
              x: padding + tileStepX + col * tileStepX,
              y: padding + tileStepY / 2 + row * tileStepY,
              z: 1
            });
          }
        }

        for (row = 0; row < 4; row++) {
          for (col = 0; col < 5; col++) {
            positions.push({
              x: padding + 2 * tileStepX + col * tileStepX,
              y: padding + tileStepY + row * tileStepY,
              z: 2
            });
          }
        }

        for (row = 0; row < 3; row++) {
          for (col = 0; col < 4; col++) {
            positions.push({
              x: padding + 2.5 * tileStepX + col * tileStepX,
              y: padding + 1.5 * tileStepY + row * tileStepY,
              z: 3
            });
          }
        }

        for (row = 0; row < 2; row++) {
          for (col = 0; col < 3; col++) {
            positions.push({
              x: padding + 3 * tileStepX + col * tileStepX,
              y: padding + 2 * tileStepY + row * tileStepY,
              z: 4
            });
          }
        }

        positions.push({ x: padding + 3.5 * tileStepX, y: padding + 2.5 * tileStepY, z: 5 });
        positions.push({ x: padding + 4.5 * tileStepX, y: padding + 2.5 * tileStepY, z: 5 });

        return positions;
      }

      function shuffleArray(arr) {
        var i;
        for (i = arr.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = arr[i];
          arr[i] = arr[j];
          arr[j] = tmp;
        }
      }

      function createTiles() {
        var positions = getTilePositions();
        var numPairs = Math.floor(positions.length / 2);
        var selectedSymbols = [];
        var i;

        for (i = 0; i < numPairs; i++) {
          var tileData = tileSymbols[i % tileSymbols.length];
          selectedSymbols.push({ symbol: tileData.symbol, type: tileData.type });
          selectedSymbols.push({ symbol: tileData.symbol, type: tileData.type });
        }

        shuffleArray(selectedSymbols);

        tiles = positions.map(function (pos, index) {
          var tileData = selectedSymbols[index] || { symbol: "🀀", type: "wind" };
          return {
            id: index,
            x: pos.x,
            y: pos.y,
            z: pos.z,
            symbol: tileData.symbol,
            type: tileData.type,
            element: null,
            removed: false
          };
        });

        totalPairs = numPairs;
      }

      function renderTiles() {
        board.innerHTML = "";

        tiles.forEach(function (tile) {
          if (tile.removed) {
            return;
          }

          var element = document.createElement("div");
          element.className = "tile";
          element.style.width = tileWidth + "px";
          element.style.height = tileHeight + "px";
          element.style.left = tile.x + "px";
          element.style.top = tile.y + "px";
          element.style.zIndex = String(tile.z + 1);
          element.setAttribute("data-type", tile.type);
          element.innerHTML = getTileHTML(tile.symbol, tile.type);

          element.addEventListener("click", function () {
            onTileClick(tile);
          });

          tile.element = element;
          board.appendChild(element);
        });

        updateBlockedStatus();
      }

      function isTileFree(tile) {
        if (!tile || tile.removed) {
          return false;
        }

        var overlapToleranceX = Math.max(8, Math.floor(tileWidth * 0.28));
        var overlapToleranceY = Math.max(8, Math.floor(tileHeight * 0.28));
        var sideTolerance = 3;
        var rowTolerance = Math.max(18, Math.floor(tileStepY * 0.28));

        var hasTileAbove = tiles.some(function (t) {
          if (t.removed || t.z <= tile.z) {
            return false;
          }

          var overlapX = Math.abs(t.x - tile.x) < (tileWidth - overlapToleranceX);
          var overlapY = Math.abs(t.y - tile.y) < (tileHeight - overlapToleranceY);

          return overlapX && overlapY;
        });

        if (hasTileAbove) {
          return false;
        }

        var leftBlocked = tiles.some(function (t) {
          if (t.removed || t.z !== tile.z || t.id === tile.id) {
            return false;
          }

          var sameRow = Math.abs(t.y - tile.y) < rowTolerance;
          var onLeft = Math.abs(t.x - (tile.x - tileStepX)) <= sideTolerance;

          return sameRow && onLeft;
        });

        var rightBlocked = tiles.some(function (t) {
          if (t.removed || t.z !== tile.z || t.id === tile.id) {
            return false;
          }

          var sameRow = Math.abs(t.y - tile.y) < rowTolerance;
          var onRight = Math.abs(t.x - (tile.x + tileStepX)) <= sideTolerance;

          return sameRow && onRight;
        });

        return !leftBlocked || !rightBlocked;
      }

      function updateBlockedStatus() {
        tiles.forEach(function (tile) {
          if (!tile.element || tile.removed) {
            return;
          }

          tile.element.classList.remove("free", "blocked");

          if (isTileFree(tile)) {
            tile.element.classList.add("free");
          } else {
            tile.element.classList.add("blocked");
          }
        });
      }

      function clearSelection() {
        if (selectedTile && selectedTile.element) {
          selectedTile.element.classList.remove("selected");
        }
        selectedTile = null;
      }

      function onTileClick(tile) {
        if (!tile || tile.removed || !tile.element) {
          return;
        }

        if (!isTileFree(tile)) {
          notify("error");
          return;
        }

        if (selectedTile && selectedTile.id === tile.id) {
          tile.element.classList.remove("selected");
          selectedTile = null;
          return;
        }

        if (!selectedTile) {
          selectedTile = tile;
          tile.element.classList.add("selected");
          return;
        }

        tile.element.classList.add("selected");

        if (selectedTile.symbol === tile.symbol) {
          matchTiles(selectedTile, tile);
          selectedTile = null;
        } else {
          if (selectedTile.element) {
            selectedTile.element.classList.remove("selected");
          }
          selectedTile = tile;
        }
      }

      function matchTiles(tile1, tile2) {
        var sessionAtStart = gameSessionId;

        impact("medium");

        if (tile1.element) {
          tile1.element.classList.remove("selected");
          tile1.element.classList.add("matched");
        }

        if (tile2.element) {
          tile2.element.classList.remove("selected");
          tile2.element.classList.add("matched");
        }

        setTimeout(function () {
          if (sessionAtStart !== gameSessionId) {
            return;
          }

          tile1.removed = true;
          tile2.removed = true;

          if (tile1.element && tile1.element.parentNode) {
            tile1.element.parentNode.removeChild(tile1.element);
          }
          if (tile2.element && tile2.element.parentNode) {
            tile2.element.parentNode.removeChild(tile2.element);
          }

          tile1.element = null;
          tile2.element = null;

          score += 100;
          pairs += 1;

          updateStats();
          updateBlockedStatus();

          if (pairs >= totalPairs) {
            gameWin();
            return;
          }

          if (!hasAvailableMoves()) {
            showNoMovesModal();
          }
        }, 280);
      }

      function hasAvailableMoves() {
        var freeTiles = tiles.filter(function (t) {
          return !t.removed && isTileFree(t);
        });

        var i;
        var j;

        for (i = 0; i < freeTiles.length; i++) {
          for (j = i + 1; j < freeTiles.length; j++) {
            if (freeTiles[i].symbol === freeTiles[j].symbol) {
              return true;
            }
          }
        }

        return false;
      }

      function updateStats() {
        scoreEl.textContent = String(score);
        pairsEl.textContent = pairs + "/" + totalPairs;
      }

      function startTimer() {
        gameStartTime = Date.now();

        if (timerInterval) {
          clearInterval(timerInterval);
        }

        timerEl.textContent = "00:00";

        timerInterval = setInterval(function () {
          var elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
          var minutes = String(Math.floor(elapsed / 60)).padStart(2, "0");
          var seconds = String(elapsed % 60).padStart(2, "0");
          timerEl.textContent = minutes + ":" + seconds;
        }, 1000);
      }

      function gameWin() {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }

        finalScoreEl.textContent = String(score);
        finalTimeEl.textContent = timerEl.textContent;
        winModal.classList.add("show");

        if (hasTelegram) {
          tg.MainButton.show();
        }

        notify("success");
      }

      function showNoMovesModal() {
        noMovesModal.classList.add("show");
      }

      function hideModals() {
        winModal.classList.remove("show");
        noMovesModal.classList.remove("show");
      }

      function showHint() {
        var freeTiles = tiles.filter(function (t) {
          return !t.removed && isTileFree(t);
        });

        var i;
        var j;

        for (i = 0; i < freeTiles.length; i++) {
          for (j = i + 1; j < freeTiles.length; j++) {
            if (freeTiles[i].symbol === freeTiles[j].symbol) {
              var tileA = freeTiles[i];
              var tileB = freeTiles[j];

              if (tileA.element) {
                tileA.element.classList.add("hint");
              }
              if (tileB.element) {
                tileB.element.classList.add("hint");
              }

              impact("light");

              setTimeout(function () {
                if (tileA.element) {
                  tileA.element.classList.remove("hint");
                }
                if (tileB.element) {
                  tileB.element.classList.remove("hint");
                }
              }, 1800);

              return;
            }
          }
        }

        showNoMovesModal();
      }

      function applySymbolsToTiles(tileList) {
        tileList.forEach(function (tile) {
          if (!tile.element) {
            return;
          }

          tile.element.setAttribute("data-type", tile.type);
          tile.element.innerHTML = getTileHTML(tile.symbol, tile.type);
        });
      }

      function shuffleTiles() {
        var activeTiles = tiles.filter(function (t) {
          return !t.removed;
        });

        if (activeTiles.length < 2) {
          hideModals();
          return;
        }

        clearSelection();

        var attempts = 0;
        var success = false;

        while (attempts < 20 && !success) {
          var symbols = activeTiles.map(function (t) {
            return { symbol: t.symbol, type: t.type };
          });

          shuffleArray(symbols);

          activeTiles.forEach(function (tile, index) {
            tile.symbol = symbols[index].symbol;
            tile.type = symbols[index].type;
          });

          updateBlockedStatus();

          if (hasAvailableMoves()) {
            success = true;
          }

          attempts++;
        }

        applySymbolsToTiles(activeTiles);
        updateBlockedStatus();
        hideModals();
      }

      function ensurePlayableBoard() {
        var attempts = 0;

        while (attempts < 20 && !hasAvailableMoves()) {
          shuffleTiles();
          attempts++;
        }
      }

      function resetGame() {
        gameSessionId += 1;

        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }

        hideModals();

        if (hasTelegram) {
          tg.MainButton.hide();
        }

        score = 0;
        pairs = 0;
        selectedTile = null;
        tiles = [];

        syncDimensions();
        createTiles();
        renderTiles();
        ensurePlayableBoard();
        updateStats();
        startTimer();
      }

      function bindEvents() {
        document.getElementById("shuffleBtn").addEventListener("click", shuffleTiles);
        document.getElementById("resetBtn").addEventListener("click", resetGame);
        document.getElementById("hintBtn").addEventListener("click", showHint);
        document.getElementById("playAgainBtn").addEventListener("click", resetGame);
        document.getElementById("modalShuffleBtn").addEventListener("click", shuffleTiles);

        window.addEventListener("resize", function () {
          var previousWidth = tileWidth;
          syncDimensions();

          if (previousWidth !== tileWidth && tiles.length > 0) {
            createTiles();
            renderTiles();
            updateStats();
            ensurePlayableBoard();
          }
        });

        if (hasTelegram) {
          tg.MainButton.onClick(function () {
            resetGame();
          });
        }
      }

      bindEvents();
      resetGame();
    })();
  </script>
</body>
</html>
