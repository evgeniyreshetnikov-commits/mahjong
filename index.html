<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🀄 Маджонг</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: linear-gradient(180deg, #1a472a 0%, #2d5a3f 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px;
            min-height: 100vh;
        }
        
        .game-header {
            text-align: center;
            margin-bottom: 5px;
            width: 100%;
        }
        
        .title {
            font-size: 18px;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-weight: bold;
        }
        
        .stats {
            display: flex;
            gap: 4px;
            justify-content: center;
            margin-bottom: 5px;
            width: 100%;
        }
        
        .stat-box {
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 8px;
            border-radius: 6px;
            border: 2px solid #ffd700;
            text-align: center;
            flex: 1;
            max-width: 65px;
        }
        
        .stat-label {
            color: #fff;
            font-size: 8px;
            text-transform: uppercase;
        }
        
        .stat-value {
            color: #ffd700;
            font-size: 13px;
            font-weight: 700;
        }
        
        .timer {
            color: #ffd700;
            font-size: 13px;
            font-weight: 700;
        }
        
        /* Игровое поле - адаптивное */
        .game-board {
            position: relative;
            background: #2d5a3f;
            border-radius: 8px;
            padding: 8px;
            border: 3px solid #8b4513;
            width: 100%;
            max-width: 340px;
            height: 440px;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        /* Плитка - базовый размер */
        .tile {
            position: absolute;
            width: 32px;
            height: 44px;
            background: linear-gradient(145deg, #f8f4e6 0%, #e8dcc8 100%);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 
                1px 1px 2px rgba(0,0,0,0.4),
                2px 2px 3px rgba(0,0,0,0.3);
            border: 1px solid #c9b896;
            z-index: 1;
        }
        
        .tile[data-type="bamboo"], .tile[data-type="character"] {
            color: #006400;
        }
        
        .tile[data-type="circle"], .tile[data-type="dragon"] {
            color: #cc0000;
        }
        
        .tile[data-type="wind"], .tile[data-type="flower"] {
            color: #000080;
        }
        
        .tile.selected {
            background: #ffd700;
            box-shadow: 0 0 10px #ffd700, 1px 1px 2px rgba(0,0,0,0.4);
            z-index: 100;
        }
        
        .tile.blocked {
            filter: brightness(0.55);
            cursor: not-allowed;
        }
        
        .tile.matched {
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .controls {
            margin-top: 8px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 340px;
            z-index: 1000;
            position: relative;
        }
        
        .btn {
            padding: 8px 10px;
            font-size: 10px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            flex: 1;
            min-width: 75px;
        }
        
        .btn-primary {
            background: linear-gradient(145deg, #ffd700 0%, #ffaa00 100%);
            color: #1a472a;
        }
        
        .btn-secondary {
            background: linear-gradient(145deg, #8b4513 0%, #654321 100%);
            color: #fff;
        }
        
        .hints {
            margin-top: 5px;
            color: #fff;
            font-size: 9px;
            text-align: center;
            opacity: 0.7;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(145deg, #1a472a 0%, #2d5a3f 100%);
            padding: 20px 15px;
            border-radius: 12px;
            text-align: center;
            border: 3px solid #ffd700;
            max-width: 85%;
        }
        
        .modal-title {
            font-size: 20px;
            color: #ffd700;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .modal-text {
            font-size: 13px;
            color: #fff;
            margin-bottom: 12px;
        }
        
        /* Адаптация под РАЗНЫЕ экраны телефонов */
        @media (max-width: 360px) {
            .game-board {
                max-width: 300px;
                height: 400px;
                padding: 6px;
            }
            .tile {
                width: 28px;
                height: 40px;
                font-size: 18px;
            }
            .title {
                font-size: 16px;
            }
            .btn {
                padding: 7px 8px;
                font-size: 9px;
                min-width: 70px;
            }
        }
        
        @media (max-width: 330px) {
            .game-board {
                max-width: 280px;
                height: 380px;
                padding: 5px;
            }
            .tile {
                width: 26px;
                height: 38px;
                font-size: 16px;
            }
        }
        
        @media (min-width: 400px) {
            .game-board {
                max-width: 360px;
                height: 460px;
            }
            .tile {
                width: 34px;
                height: 46px;
                font-size: 22px;
            }
        }
        
        @media (min-height: 800px) {
            .game-board {
                height: 500px;
            }
        }
    </style>
</head>
<body>
    <div class="game-header">
        <h1 class="title">🀄 Маджонг</h1>
    </div>
    
    <div class="stats">
        <div class="stat-box">
            <div class="stat-label">Счёт</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Пары</div>
            <div class="stat-value" id="pairs">0/0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Время</div>
            <div class="timer" id="timer">00:00</div>
        </div>
    </div>
    
    <div class="game-board" id="board"></div>
    
    <div class="controls">
        <button class="btn btn-primary" onclick="shuffleTiles()">Перемешать</button>
        <button class="btn btn-secondary" onclick="resetGame()">Новая игра</button>
        <button class="btn btn-secondary" onclick="showHint()">Подсказка</button>
    </div>
    
    <div class="hints">Нажмите на две одинаковые плитки</div>
    
    <div class="modal" id="winModal">
        <div class="modal-content">
            <div class="modal-title">🎉 Победа!</div>
            <div class="modal-text">Счёт: <span id="finalScore">0</span></div>
            <div class="modal-text">Время: <span id="finalTime">00:00</span></div>
            <button class="btn btn-primary" onclick="resetGame()">Играть снова</button>
        </div>
    </div>
    
    <div class="modal" id="noMovesModal">
        <div class="modal-content">
            <div class="modal-title">⚠️ Нет ходов!</div>
            <button class="btn btn-primary" onclick="shuffleTiles()">Перемешать</button>
        </div>
    </div>

    <script>
        var tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        if (tg.colorScheme === 'light') {
            document.body.style.background = 'linear-gradient(180deg, #e8f5e9 0%, #c8e6c9 100%)';
        }
        
        tg.MainButton.setText('🎮 ИГРАТЬ СНОВА');
        tg.MainButton.setParams({
            color: '#2d5a3f',
            text_color: '#ffd700'
        });
        
        var tileSymbols = [
            { symbol: '🀀', type: 'wind' }, { symbol: '🀁', type: 'wind' },
            { symbol: '🀂', type: 'wind' }, { symbol: '🀃', type: 'wind' },
            { symbol: '🀄', type: 'dragon' }, { symbol: '🀅', type: 'dragon' },
            { symbol: '🀆', type: 'dragon' },
            { symbol: '🀇', type: 'character' }, { symbol: '🀈', type: 'character' },
            { symbol: '🀉', type: 'character' }, { symbol: '🀊', type: 'character' },
            { symbol: '🀋', type: 'character' }, { symbol: '🀌', type: 'character' },
            { symbol: '🀍', type: 'character' }, { symbol: '🀎', type: 'character' },
            { symbol: '🀏', type: 'character' },
            { symbol: '🀐', type: 'bamboo' }, { symbol: '🀑', type: 'bamboo' },
            { symbol: '🀒', type: 'bamboo' }, { symbol: '🀓', type: 'bamboo' },
            { symbol: '🀔', type: 'bamboo' }, { symbol: '🀕', type: 'bamboo' },
            { symbol: '🀖', type: 'bamboo' }, { symbol: '🀗', type: 'bamboo' },
            { symbol: '🀘', type: 'bamboo' },
            { symbol: '🀙', type: 'circle' }, { symbol: '🀚', type: 'circle' },
            { symbol: '🀛', type: 'circle' }, { symbol: '🀜', type: 'circle' },
            { symbol: '🀝', type: 'circle' }, { symbol: '🀞', type: 'circle' },
            { symbol: '🀟', type: 'circle' }, { symbol: '🀠', type: 'circle' },
            { symbol: '🀡', type: 'circle' }
        ];

        var tiles = [];
        var selectedTile = null;
        var score = 0;
        var pairs = 0;
        var gameStartTime = 0;
        var timerInterval = null;
        var totalPairs = 0;
        
        // Динамические размеры - вычисляются при загрузке
        var tileWidth = 32;
        var tileHeight = 44;
        var tileStepX = 34;
        var tileStepY = 46;
        var boardWidth = 340;
        var boardHeight = 440;
        var padding = 8;
        var cols = 8;
        var rows = 6;

        // Вычисление размеров под экран
        function calculateSizes() {
            var screenWidth = window.innerWidth - 20;
            var screenHeight = window.innerHeight - 150;
            
            // Определяем максимальную ширину поля
            if (screenWidth < 320) {
                boardWidth = 280;
                tileWidth = 26;
                tileStepX = 28;
            } else if (screenWidth < 360) {
                boardWidth = 300;
                tileWidth = 28;
                tileStepX = 30;
            } else if (screenWidth < 400) {
                boardWidth = 340;
                tileWidth = 32;
                tileStepX = 34;
            } else {
                boardWidth = 360;
                tileWidth = 34;
                tileStepX = 36;
            }
            
            // Высота под экран
            if (screenHeight < 450) {
                boardHeight = 380;
                tileHeight = 38;
                tileStepY = 40;
            } else if (screenHeight < 550) {
                boardHeight = 440;
                tileHeight = 44;
                tileStepY = 46;
            } else {
                boardHeight = 500;
                tileHeight = 48;
                tileStepY = 50;
            }
            
            // Обновляем CSS переменные
            document.documentElement.style.setProperty('--tile-width', tileWidth + 'px');
            document.documentElement.style.setProperty('--tile-height', tileHeight + 'px');
            document.documentElement.style.setProperty('--board-width', boardWidth + 'px');
            document.documentElement.style.setProperty('--board-height', boardHeight + 'px');
        }

        // Упрощённая раскладка - меньше плиток для мобильных
        function getTilePositions() {
            var positions = [];
            
            // Слой 0 - 8×5 = 40 плиток
            for (var row = 0; row < 5; row++) {
                for (var col = 0; col < 8; col++) {
                    positions.push({
                        x: padding + col * tileStepX,
                        y: padding + row * tileStepY,
                        z: 0
                    });
                }
            }
            
            // Слой 1 - 6×2 = 12 плиток
            for (var row = 0; row < 2; row++) {
                for (var col = 0; col < 6; col++) {
                    positions.push({
                        x: padding + tileStepX + col * tileStepX,
                        y: padding + tileStepY + row * tileStepY,
                        z: 1
                    });
                }
            }
            
            // Слой 2 - 4×1 = 4 плитки
            for (var col = 0; col < 4; col++) {
                positions.push({
                    x: padding + 2 * tileStepX + col * tileStepX,
                    y: padding + 2 * tileStepY,
                    z: 2
                });
            }
            
            // Слой 3 - 2 плитки вершина
            positions.push({ 
                x: padding + 3 * tileStepX, 
                y: padding + 3 * tileStepY, 
                z: 3 
            });
            positions.push({ 
                x: padding + 4 * tileStepX, 
                y: padding + 3 * tileStepY, 
                z: 3 
            });
            
            return positions;
        }

        function createTiles() {
            var positions = getTilePositions();
            var numPairs = Math.floor(positions.length / 2);
            var selectedSymbols = [];
            
            for (var i = 0; i < numPairs; i++) {
                var tileData = tileSymbols[i % tileSymbols.length];
                selectedSymbols.push({ symbol: tileData.symbol, type: tileData.type });
                selectedSymbols.push({ symbol: tileData.symbol, type: tileData.type });
            }
            
            for (var i = selectedSymbols.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = selectedSymbols[i];
                selectedSymbols[i] = selectedSymbols[j];
                selectedSymbols[j] = temp;
            }
            
            tiles = positions.map(function(pos, index) {
                return {
                    id: index,
                    x: pos.x,
                    y: pos.y,
                    z: pos.z,
                    symbol: selectedSymbols[index] ? selectedSymbols[index].symbol : '🀀',
                    type: selectedSymbols[index] ? selectedSymbols[index].type : 'character',
                    element: null,
                    removed: false
                };
            });
            
            totalPairs = numPairs;
        }

        function renderTiles() {
            var board = document.getElementById('board');
            if (!board) return;
            
            board.innerHTML = '';
            board.style.width = boardWidth + 'px';
            board.style.height = boardHeight + 'px';
            
            tiles.forEach(function(tile) {
                if (tile.removed) return;
                
                var element = document.createElement('div');
                element.className = 'tile';
                element.textContent = tile.symbol;
                element.setAttribute('data-type', tile.type);
                element.style.width = tileWidth + 'px';
                element.style.height = tileHeight + 'px';
                element.style.fontSize = (tileWidth * 0.6) + 'px';
                element.style.left = tile.x + 'px';
                element.style.top = tile.y + 'px';
                element.style.zIndex = tile.z + 1;
                
                element.addEventListener('click', function() {
                    onTileClick(tile);
                });
                
                tile.element = element;
                board.appendChild(element);
            });
            
            setTimeout(function() {
                updateBlockedStatus();
            }, 50);
        }

        function isTileBlocked(tile) {
            var hasTileAbove = tiles.some(function(t) {
                return !t.removed && t.z > tile.z &&
                    Math.abs(t.x - tile.x) < tileWidth - 5 &&
                    Math.abs(t.y - tile.y) < tileHeight - 5;
            });
            
            if (hasTileAbove) return true;
            
            var leftBlocked = tiles.some(function(t) {
                return !t.removed && t.z === tile.z &&
                    Math.abs(t.y - tile.y) < 20 &&
                    t.x === tile.x - tileWidth;
            });
            
            var rightBlocked = tiles.some(function(t) {
                return !t.removed && t.z === tile.z &&
                    Math.abs(t.y - tile.y) < 20 &&
                    t.x === tile.x + tileWidth;
            });
            
            return leftBlocked && rightBlocked;
        }

        function updateBlockedStatus() {
            tiles.forEach(function(tile) {
                if (tile.element && !tile.removed) {
                    if (isTileBlocked(tile)) {
                        tile.element.classList.add('blocked');
                    } else {
                        tile.element.classList.remove('blocked');
                    }
                }
            });
        }

        function onTileClick(tile) {
            if (tile.removed || isTileBlocked(tile)) return;
            
            if (selectedTile === tile) {
                tile.element.classList.remove('selected');
                selectedTile = null;
                return;
            }
            
            tile.element.classList.add('selected');
            
            if (selectedTile) {
                if (selectedTile.symbol === tile.symbol) {
                    matchTiles(selectedTile, tile);
                    selectedTile = null;
                } else {
                    selectedTile.element.classList.remove('selected');
                    selectedTile = tile;
                }
            } else {
                selectedTile = tile;
            }
        }

        function matchTiles(tile1, tile2) {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
            
            tile1.element.classList.remove('selected');
            tile2.element.classList.remove('selected');
            tile1.element.classList.add('matched');
            tile2.element.classList.add('matched');
            
            setTimeout(function() {
                tile1.removed = true;
                tile2.removed = true;
                if (tile1.element && tile1.element.parentNode) {
                    tile1.element.parentNode.removeChild(tile1.element);
                }
                if (tile2.element && tile2.element.parentNode) {
                    tile2.element.parentNode.removeChild(tile2.element);
                }
                
                score += 100;
                pairs++;
                updateStats();
                updateBlockedStatus();
                
                if (pairs >= totalPairs) {
                    gameWin();
                } else if (!hasAvailableMoves()) {
                    showNoMovesModal();
                }
            }, 300);
        }

        function hasAvailableMoves() {
            var availableTiles = tiles.filter(function(t) {
                return !t.removed && !isTileBlocked(t);
            });
            for (var i = 0; i < availableTiles.length; i++) {
                for (var j = i + 1; j < availableTiles.length; j++) {
                    if (availableTiles[i].symbol === availableTiles[j].symbol) {
                        return true;
                    }
                }
            }
            return false;
        }

        function updateStats() {
            var scoreEl = document.getElementById('score');
            var pairsEl = document.getElementById('pairs');
            if (scoreEl) scoreEl.textContent = score;
            if (pairsEl) pairsEl.textContent = pairs + '/' + totalPairs;
        }

        function startTimer() {
            gameStartTime = Date.now();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(function() {
                var elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
                var minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
                var seconds = (elapsed % 60).toString().padStart(2, '0');
                var timerEl = document.getElementById('timer');
                if (timerEl) timerEl.textContent = minutes + ':' + seconds;
            }, 1000);
        }

        function gameWin() {
            clearInterval(timerInterval);
            var finalTime = document.getElementById('timer').textContent;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalTime').textContent = finalTime;
            document.getElementById('winModal').classList.add('show');
            
            tg.MainButton.show();
            
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
        }

        function showNoMovesModal() {
            document.getElementById('noMovesModal').classList.add('show');
        }

        function shuffleTiles() {
            var availableTiles = tiles.filter(function(t) {
                return !t.removed;
            });
            var symbols = availableTiles.map(function(t) {
                return { symbol: t.symbol, type: t.type };
            });
            
            for (var i = symbols.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = symbols[i];
                symbols[i] = symbols[j];
                symbols[j] = temp;
            }
            
            availableTiles.forEach(function(tile, index) {
                tile.symbol = symbols[index].symbol;
                tile.type = symbols[index].type;
                if (tile.element) {
                    tile.element.textContent = tile.symbol;
                    tile.element.setAttribute('data-type', tile.type);
                }
            });
            
            selectedTile = null;
            updateBlockedStatus();
            document.getElementById('noMovesModal').classList.remove('show');
        }

        function resetGame() {
            clearInterval(timerInterval);
            document.getElementById('winModal').classList.remove('show');
            document.getElementById('noMovesModal').classList.remove('show');
            tg.MainButton.hide();
            
            score = 0;
            pairs = 0;
            selectedTile = null;
            
            // Пересчитываем размеры перед новой игрой
            calculateSizes();
            
            tiles = [];
            createTiles();
            renderTiles();
            updateStats();
            startTimer();
        }

        tg.MainButton.onClick(function() {
            resetGame();
        });

        // Обработка изменения размера окна
        window.addEventListener('resize', function() {
            calculateSizes();
        });

        window.addEventListener('load', function() {
            calculateSizes();
            setTimeout(function() {
                resetGame();
            }, 100);
        });
    </script>
</body>
</html>
