<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>🀄 Маджонг</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg-top: #dfece0;
      --bg-bottom: #cadcc9;
      --panel-bg: rgba(255,255,255,0.34);
      --panel-border: #f3c900;
      --title-color: #f3c900;
      --board-border: #a35a16;
      --board-fill-1: #2e6848;
      --board-fill-2: #24563a;
      --tile-border: #d7ccb8;
      --tile-edge: #f3ebdd;
      --tile-shadow: rgba(0,0,0,0.30);
      --tile-shadow-2: rgba(0,0,0,0.18);
      --btn-brown-1: #9d5a1c;
      --btn-brown-2: #7c4513;
      --btn-gold-1: #ffd400;
      --btn-gold-2: #efb400;
      --hint: #00ff66;
      --selected: #ff8f00;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
    html, body { width: 100%; min-height: 100%; overflow-x: hidden; font-family: Arial, Helvetica, sans-serif; }
    body {
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      display: flex; justify-content: center;
      padding: calc(env(safe-area-inset-top, 0px) + 8px) 8px calc(env(safe-area-inset-bottom, 0px) + 14px);
      color: #fff;
    }
    .app { width: min(100%, 460px); display: flex; flex-direction: column; align-items: center; }
    .game-header { width: 100%; text-align: center; margin-bottom: 8px; }
    .title {
      font-size: 28px; font-weight: 900; color: var(--title-color); line-height: 1.1;
      text-shadow: 0 3px 8px rgba(0,0,0,0.35);
    }

    .stats { width: 100%; display: flex; gap: 8px; margin-bottom: 12px; }
    .stat-box {
      flex: 1; min-width: 0; background: var(--panel-bg); border: 3px solid var(--panel-border); border-radius: 14px;
      padding: 10px 6px; text-align: center; box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }
    .stat-label { font-size: 11px; text-transform: uppercase; font-weight: 800; color: rgba(255,255,255,0.78); margin-bottom: 5px; }
    .stat-value { font-size: 20px; font-weight: 900; color: var(--title-color); }

    .game-board {
      width: 100%; position: relative; border-radius: 16px; border: 4px solid var(--board-border);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 30%),
        linear-gradient(180deg, var(--board-fill-1) 0%, var(--board-fill-2) 100%);
      box-shadow: 0 10px 24px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.14);
      overflow: hidden;
    }
    .board-inner { position: relative; transform-origin: top left; }

    .tile {
      position: absolute;
      border-radius: 13px;
      border: 3px solid var(--tile-border);
      background: linear-gradient(145deg, #fffdf8 0%, var(--tile-edge) 100%);
      box-shadow:
        0 3px 8px var(--tile-shadow),
        0 8px 18px var(--tile-shadow-2),
        inset 0 2px 4px rgba(255,255,255,0.95);
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease, opacity 0.25s ease;
      cursor: pointer;
    }
    .tile::after {
      content: "";
      position: absolute; inset: 0; border-radius: 10px; pointer-events: none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.55);
    }
    .tile-art {
      width: 100%; height: 100%; display: block; object-fit: cover; pointer-events: none;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }
    .tile.blocked { filter: brightness(0.48) saturate(0.82); cursor: not-allowed; }
    .tile.free { filter: brightness(1); }
    .tile.selected {
      border: 4px solid var(--selected);
      box-shadow:
        0 0 18px rgba(255, 171, 0, 0.9),
        0 0 28px rgba(255, 171, 0, 0.45),
        0 8px 18px rgba(0,0,0,0.22);
      transform: scale(1.05);
      z-index: 999 !important;
    }
    .tile.hint {
      border: 4px solid var(--hint);
      box-shadow:
        0 0 18px rgba(0,255,102,0.92),
        0 0 26px rgba(0,255,102,0.5),
        0 8px 18px rgba(0,0,0,0.22);
      animation: hintPulse 0.75s ease-in-out infinite;
      z-index: 999 !important;
    }
    .tile.matched { opacity: 0; transform: scale(0.6); pointer-events: none; }
    @keyframes hintPulse { 0%,100%{ transform: scale(1.03);} 50%{ transform: scale(1.08);} }

    .controls { width: 100%; display: flex; gap: 8px; margin-top: 12px; }
    .btn {
      flex: 1; min-width: 0; border: none; border-radius: 14px; padding: 15px 8px;
      font-size: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.15);
    }
    .btn-primary { background: linear-gradient(145deg, var(--btn-gold-1) 0%, var(--btn-gold-2) 100%); color: #244733; }
    .btn-secondary { background: linear-gradient(145deg, var(--btn-brown-1) 0%, var(--btn-brown-2) 100%); color: #fff; }
    .hints { margin-top: 10px; text-align: center; font-size: 12px; color: rgba(255,255,255,0.82); }

    .modal {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.88); padding: 16px; z-index: 3000;
    }
    .modal.show { display: flex; }
    .modal-content {
      width: 100%; max-width: 360px; border-radius: 18px; border: 4px solid var(--panel-border);
      padding: 28px 22px; text-align: center;
      background: linear-gradient(145deg, #1a472a 0%, #2d5a3f 100%);
      box-shadow: 0 18px 36px rgba(0,0,0,0.4);
    }
    .modal-title { font-size: 30px; color: var(--panel-border); font-weight: 900; margin-bottom: 14px; }
    .modal-text { font-size: 18px; color: #fff; margin-bottom: 14px; }

    @media (max-width: 390px) {
      .title { font-size: 26px; }
      .stat-value { font-size: 18px; }
      .btn { font-size: 11px; padding: 14px 6px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="game-header">
      <h1 class="title">🀄 Маджонг</h1>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">Счёт</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Пары</div>
        <div class="stat-value" id="pairs">0/0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Время</div>
        <div class="stat-value" id="timer">00:00</div>
      </div>
    </div>

    <div class="game-board" id="board">
      <div class="board-inner" id="boardInner"></div>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="shuffleBtn" type="button">Перемешать</button>
      <button class="btn btn-secondary" id="resetBtn" type="button">Новая игра</button>
      <button class="btn btn-secondary" id="hintBtn" type="button">Подсказка</button>
    </div>

    <div class="hints">Нажмите на две одинаковые свободные плитки</div>
  </div>

  <div class="modal" id="winModal">
    <div class="modal-content">
      <div class="modal-title">🎉 Победа!</div>
      <div class="modal-text">Вы очистили все плитки!</div>
      <div class="modal-text">Счёт: <span id="finalScore">0</span></div>
      <div class="modal-text">Время: <span id="finalTime">00:00</span></div>
      <button class="btn btn-primary" id="playAgainBtn" type="button">Играть снова</button>
    </div>
  </div>

  <div class="modal" id="noMovesModal">
    <div class="modal-content">
      <div class="modal-title">⚠️ Нет ходов!</div>
      <div class="modal-text">Доступных пар не осталось</div>
      <button class="btn btn-primary" id="modalShuffleBtn" type="button">Перемешать</button>
    </div>
  </div>

  <script>
    (function () {
      var tg = null;
      var hasTelegram = false;

      if (window.Telegram && window.Telegram.WebApp) {
        tg = window.Telegram.WebApp;
        hasTelegram = true;
      }

      if (hasTelegram) {
        tg.ready();
        tg.expand();
        if (tg.colorScheme === "dark") {
          document.documentElement.style.setProperty("--bg-top", "#264332");
          document.documentElement.style.setProperty("--bg-bottom", "#1c3024");
          document.documentElement.style.setProperty("--panel-bg", "rgba(255,255,255,0.14)");
        }
        tg.MainButton.setText("🎮 ИГРАТЬ СНОВА");
        tg.MainButton.setParams({ color: "#2d5a3f", text_color: "#ffd700" });
        tg.MainButton.hide();
      }

      var board = document.getElementById("board");
      var boardInner = document.getElementById("boardInner");
      var scoreEl = document.getElementById("score");
      var pairsEl = document.getElementById("pairs");
      var timerEl = document.getElementById("timer");
      var winModal = document.getElementById("winModal");
      var noMovesModal = document.getElementById("noMovesModal");
      var finalScoreEl = document.getElementById("finalScore");
      var finalTimeEl = document.getElementById("finalTime");

      var BASE_TILE_W = 54;
      var BASE_TILE_H = 72;
      var BASE_STEP_X = 56;
      var BASE_STEP_Y = 74;
      var BASE_PADDING = 12;

      var tileWidth = BASE_TILE_W;
      var tileHeight = BASE_TILE_H;
      var tileStepX = BASE_STEP_X;
      var tileStepY = BASE_STEP_Y;
      var padding = BASE_PADDING;

      var boardScale = 1;
      var layoutWidth = 0;
      var layoutHeight = 0;

      var tiles = [];
      var selectedTile = null;
      var score = 0;
      var pairs = 0;
      var totalPairs = 0;
      var gameStartTime = 0;
      var timerInterval = null;
      var gameSessionId = 0;

      var tileCatalog = [
        { key: "wind-east", type: "wind" },
        { key: "wind-south", type: "wind" },
        { key: "wind-west", type: "wind" },
        { key: "wind-north", type: "wind" },
        { key: "dragon-red", type: "dragon" },
        { key: "dragon-green", type: "dragon" },
        { key: "dragon-white", type: "dragon" },
        { key: "character-1", type: "character" },
        { key: "character-2", type: "character" },
        { key: "character-3", type: "character" },
        { key: "character-4", type: "character" },
        { key: "character-5", type: "character" },
        { key: "character-6", type: "character" },
        { key: "character-7", type: "character" },
        { key: "character-8", type: "character" },
        { key: "character-9", type: "character" },
        { key: "bamboo-1", type: "bamboo" },
        { key: "bamboo-2", type: "bamboo" },
        { key: "bamboo-3", type: "bamboo" },
        { key: "bamboo-4", type: "bamboo" },
        { key: "bamboo-5", type: "bamboo" },
        { key: "bamboo-6", type: "bamboo" },
        { key: "bamboo-7", type: "bamboo" },
        { key: "bamboo-8", type: "bamboo" },
        { key: "bamboo-9", type: "bamboo" },
        { key: "circle-1", type: "circle" },
        { key: "circle-2", type: "circle" },
        { key: "circle-3", type: "circle" },
        { key: "circle-4", type: "circle" },
        { key: "circle-5", type: "circle" },
        { key: "circle-6", type: "circle" },
        { key: "circle-7", type: "circle" },
        { key: "circle-8", type: "circle" },
        { key: "circle-9", type: "circle" }
      ];

      function impact(type) {
        if (hasTelegram && tg.HapticFeedback && tg.HapticFeedback.impactOccurred) {
          tg.HapticFeedback.impactOccurred(type);
        }
      }

      function notify(type) {
        if (hasTelegram && tg.HapticFeedback && tg.HapticFeedback.notificationOccurred) {
          tg.HapticFeedback.notificationOccurred(type);
        }
      }

      function getTileImagePath(tileKey) {
        return "assets/tiles/" + tileKey + ".svg";
      }

      function getTileHTML(tileKey) {
        return '<img class="tile-art" alt="" src="' + getTileImagePath(tileKey) + '" draggable="false">';
      }

      function shuffleArray(arr) {
        for (var i = arr.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var temp = arr[i];
          arr[i] = arr[j];
          arr[j] = temp;
        }
      }

      function getTilePositions() {
        var positions = [];
        var row, col;

        for (row = 0; row < 6; row++) {
          for (col = 0; col < 7; col++) positions.push({ x: padding + col * tileStepX, y: padding + row * tileStepY, z: 0 });
        }
        for (row = 0; row < 5; row++) {
          for (col = 0; col < 6; col++) positions.push({ x: padding + tileStepX + col * tileStepX, y: padding + tileStepY / 2 + row * tileStepY, z: 1 });
        }
        for (row = 0; row < 4; row++) {
          for (col = 0; col < 5; col++) positions.push({ x: padding + 2 * tileStepX + col * tileStepX, y: padding + tileStepY + row * tileStepY, z: 2 });
        }
        for (row = 0; row < 3; row++) {
          for (col = 0; col < 4; col++) positions.push({ x: padding + 2.5 * tileStepX + col * tileStepX, y: padding + 1.5 * tileStepY + row * tileStepY, z: 3 });
        }
        for (row = 0; row < 2; row++) {
          for (col = 0; col < 3; col++) positions.push({ x: padding + 3 * tileStepX + col * tileStepX, y: padding + 2 * tileStepY + row * tileStepY, z: 4 });
        }
        positions.push({ x: padding + 3.5 * tileStepX, y: padding + 2.5 * tileStepY, z: 5 });
        positions.push({ x: padding + 4.5 * tileStepX, y: padding + 2.5 * tileStepY, z: 5 });
        return positions;
      }

      function calculateLayoutBounds() {
        var positions = getTilePositions();
        var maxRight = 0;
        var maxBottom = 0;
        for (var i = 0; i < positions.length; i++) {
          var p = positions[i];
          if (p.x + tileWidth > maxRight) maxRight = p.x + tileWidth;
          if (p.y + tileHeight > maxBottom) maxBottom = p.y + tileHeight;
        }
        layoutWidth = Math.ceil(maxRight + padding);
        layoutHeight = Math.ceil(maxBottom + padding);
      }

      function updateBoardMetrics() {
        var appWidth = Math.min(window.innerWidth - 16, 460);
        var statsApprox = 76;
        var headerApprox = 44;
        var controlsApprox = 60;
        var hintsApprox = 22;
        var extraSpacing = 58;
        var availableHeight = window.innerHeight - statsApprox - headerApprox - controlsApprox - hintsApprox - extraSpacing;
        if (availableHeight < 400) availableHeight = 400;

        calculateLayoutBounds();

        var boardInnerWidth = appWidth - 8;
        if (boardInnerWidth < 300) boardInnerWidth = 300;

        var scaleX = boardInnerWidth / layoutWidth;
        var scaleY = availableHeight / layoutHeight;
        boardScale = Math.min(scaleX, scaleY, 1);

        board.style.height = Math.ceil(layoutHeight * boardScale) + "px";
      }

      function createTiles() {
        var positions = getTilePositions();
        var numPairs = Math.floor(positions.length / 2);
        var selectedTiles = [];

        for (var i = 0; i < numPairs; i++) {
          var tileData = tileCatalog[i % tileCatalog.length];
          selectedTiles.push({ key: tileData.key, type: tileData.type });
          selectedTiles.push({ key: tileData.key, type: tileData.type });
        }

        shuffleArray(selectedTiles);

        tiles = positions.map(function (pos, index) {
          var tileData = selectedTiles[index];
          return {
            id: index,
            x: pos.x,
            y: pos.y,
            z: pos.z,
            key: tileData.key,
            type: tileData.type,
            element: null,
            removed: false
          };
        });

        totalPairs = numPairs;
      }

      function renderTiles() {
        boardInner.innerHTML = "";
        boardInner.style.width = layoutWidth + "px";
        boardInner.style.height = layoutHeight + "px";
        boardInner.style.transform = "scale(" + boardScale + ")";

        tiles.forEach(function (tile) {
          if (tile.removed) return;

          var element = document.createElement("div");
          element.className = "tile";
          element.style.width = tileWidth + "px";
          element.style.height = tileHeight + "px";
          element.style.left = tile.x + "px";
          element.style.top = tile.y + "px";
          element.style.zIndex = String(tile.z + 1);
          element.innerHTML = getTileHTML(tile.key);

          element.addEventListener("click", function () {
            onTileClick(tile);
          });

          tile.element = element;
          boardInner.appendChild(element);
        });

        updateBlockedStatus();
      }

      function isTileFree(tile) {
        if (!tile || tile.removed) return false;

        var overlapToleranceX = Math.max(8, Math.floor(tileWidth * 0.28));
        var overlapToleranceY = Math.max(8, Math.floor(tileHeight * 0.28));
        var sideTolerance = 3;
        var rowTolerance = Math.max(18, Math.floor(tileStepY * 0.28));

        var hasTileAbove = tiles.some(function (t) {
          if (t.removed || t.z <= tile.z) return false;
          var overlapX = Math.abs(t.x - tile.x) < (tileWidth - overlapToleranceX);
          var overlapY = Math.abs(t.y - tile.y) < (tileHeight - overlapToleranceY);
          return overlapX && overlapY;
        });

        if (hasTileAbove) return false;

        var leftBlocked = tiles.some(function (t) {
          if (t.removed || t.z !== tile.z || t.id === tile.id) return false;
          var sameRow = Math.abs(t.y - tile.y) < rowTolerance;
          var onLeft = Math.abs(t.x - (tile.x - tileStepX)) <= sideTolerance;
          return sameRow && onLeft;
        });

        var rightBlocked = tiles.some(function (t) {
          if (t.removed || t.z !== tile.z || t.id === tile.id) return false;
          var sameRow = Math.abs(t.y - tile.y) < rowTolerance;
          var onRight = Math.abs(t.x - (tile.x + tileStepX)) <= sideTolerance;
          return sameRow && onRight;
        });

        return !leftBlocked || !rightBlocked;
      }

      function updateBlockedStatus() {
        tiles.forEach(function (tile) {
          if (!tile.element || tile.removed) return;
          tile.element.classList.remove("free", "blocked");
          tile.element.classList.add(isTileFree(tile) ? "free" : "blocked");
        });
      }

      function clearSelection() {
        if (selectedTile && selectedTile.element) {
          selectedTile.element.classList.remove("selected");
        }
        selectedTile = null;
      }

      function onTileClick(tile) {
        if (!tile || tile.removed || !tile.element) return;

        if (!isTileFree(tile)) {
          notify("error");
          return;
        }

        if (selectedTile && selectedTile.id === tile.id) {
          tile.element.classList.remove("selected");
          selectedTile = null;
          return;
        }

        if (!selectedTile) {
          selectedTile = tile;
          tile.element.classList.add("selected");
          return;
        }

        tile.element.classList.add("selected");

        if (selectedTile.key === tile.key) {
          matchTiles(selectedTile, tile);
          selectedTile = null;
        } else {
          if (selectedTile.element) selectedTile.element.classList.remove("selected");
          selectedTile = tile;
        }
      }

      function matchTiles(tile1, tile2) {
        var sessionAtStart = gameSessionId;
        impact("medium");

        if (tile1.element) {
          tile1.element.classList.remove("selected");
          tile1.element.classList.add("matched");
        }
        if (tile2.element) {
          tile2.element.classList.remove("selected");
          tile2.element.classList.add("matched");
        }

        setTimeout(function () {
          if (sessionAtStart !== gameSessionId) return;

          tile1.removed = true;
          tile2.removed = true;

          if (tile1.element && tile1.element.parentNode) tile1.element.parentNode.removeChild(tile1.element);
          if (tile2.element && tile2.element.parentNode) tile2.element.parentNode.removeChild(tile2.element);

          tile1.element = null;
          tile2.element = null;

          score += 100;
          pairs += 1;
          updateStats();
          updateBlockedStatus();

          if (pairs >= totalPairs) {
            gameWin();
          } else if (!hasAvailableMoves()) {
            showNoMovesModal();
          }
        }, 260);
      }

      function hasAvailableMoves() {
        var freeTiles = tiles.filter(function (t) { return !t.removed && isTileFree(t); });
        for (var i = 0; i < freeTiles.length; i++) {
          for (var j = i + 1; j < freeTiles.length; j++) {
            if (freeTiles[i].key === freeTiles[j].key) return true;
          }
        }
        return false;
      }

      function updateStats() {
        scoreEl.textContent = String(score);
        pairsEl.textContent = pairs + "/" + totalPairs;
      }

      function startTimer() {
        gameStartTime = Date.now();
        if (timerInterval) clearInterval(timerInterval);
        timerEl.textContent = "00:00";
        timerInterval = setInterval(function () {
          var elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
          var minutes = String(Math.floor(elapsed / 60)).padStart(2, "0");
          var seconds = String(elapsed % 60).padStart(2, "0");
          timerEl.textContent = minutes + ":" + seconds;
        }, 1000);
      }

      function gameWin() {
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        finalScoreEl.textContent = String(score);
        finalTimeEl.textContent = timerEl.textContent;
        winModal.classList.add("show");
        if (hasTelegram) tg.MainButton.show();
        notify("success");
      }

      function showNoMovesModal() {
        noMovesModal.classList.add("show");
      }

      function hideModals() {
        winModal.classList.remove("show");
        noMovesModal.classList.remove("show");
      }

      function showHint() {
        var freeTiles = tiles.filter(function (t) { return !t.removed && isTileFree(t); });

        for (var i = 0; i < freeTiles.length; i++) {
          for (var j = i + 1; j < freeTiles.length; j++) {
            if (freeTiles[i].key === freeTiles[j].key) {
              var tileA = freeTiles[i];
              var tileB = freeTiles[j];
              if (tileA.element) tileA.element.classList.add("hint");
              if (tileB.element) tileB.element.classList.add("hint");
              impact("light");
              setTimeout(function () {
                if (tileA.element) tileA.element.classList.remove("hint");
                if (tileB.element) tileB.element.classList.remove("hint");
              }, 1800);
              return;
            }
          }
        }

        showNoMovesModal();
      }

      function applyTileImages(tileList) {
        tileList.forEach(function (tile) {
          if (!tile.element) return;
          tile.element.innerHTML = getTileHTML(tile.key);
        });
      }

      function shuffleTiles() {
        var activeTiles = tiles.filter(function (t) { return !t.removed; });
        if (activeTiles.length < 2) {
          hideModals();
          return;
        }

        clearSelection();

        var attempts = 0;
        var success = false;
        while (attempts < 20 && !success) {
          var values = activeTiles.map(function (t) {
            return { key: t.key, type: t.type };
          });

          shuffleArray(values);

          activeTiles.forEach(function (tile, index) {
            tile.key = values[index].key;
            tile.type = values[index].type;
          });

          if (hasAvailableMoves()) success = true;
          attempts++;
        }

        applyTileImages(activeTiles);
        updateBlockedStatus();
        hideModals();
      }

      function ensurePlayableBoard() {
        var attempts = 0;
        while (attempts < 20 && !hasAvailableMoves()) {
          shuffleTiles();
          attempts++;
        }
      }

      function resetGame() {
        gameSessionId += 1;

        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }

        hideModals();
        if (hasTelegram) tg.MainButton.hide();

        score = 0;
        pairs = 0;
        selectedTile = null;
        tiles = [];

        updateBoardMetrics();
        createTiles();
        renderTiles();
        ensurePlayableBoard();
        updateStats();
        startTimer();
      }

      function rebuildBoardOnly() {
        updateBoardMetrics();
        renderTiles();
      }

      document.getElementById("shuffleBtn").addEventListener("click", shuffleTiles);
      document.getElementById("resetBtn").addEventListener("click", resetGame);
      document.getElementById("hintBtn").addEventListener("click", showHint);
      document.getElementById("playAgainBtn").addEventListener("click", resetGame);
      document.getElementById("modalShuffleBtn").addEventListener("click", shuffleTiles);

      window.addEventListener("resize", function () {
        if (tiles.length > 0) rebuildBoardOnly();
        else updateBoardMetrics();
      });

      if (hasTelegram) {
        tg.MainButton.onClick(function () {
          resetGame();
        });
      }

      updateBoardMetrics();
      resetGame();
    })();
  </script>
</body>
</html>
