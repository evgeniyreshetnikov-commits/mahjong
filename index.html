<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🀄 Маджонг</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        body {
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3f 50%, #1a472a 100%);
            min-height: 100vh;
            font-family: 'Noto Sans JP', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            overflow-x: hidden;
            overscroll-behavior: none;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .game-header {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .title {
            font-size: 32px;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid #ffd700;
            backdrop-filter: blur(10px);
        }
        
        .stat-label {
            color: #fff;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .stat-value {
            color: #ffd700;
            font-size: 20px;
            font-weight: 700;
        }
        
        .game-board {
            position: relative;
            background: #2d5a3f;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 3px solid #8b4513;
            width: 100%;
            max-width: 500px;
            height: 500px;
            overflow: hidden;
        }
        
        .tile {
            position: absolute;
            width: 42px;
            height: 58px;
            background: linear-gradient(145deg, #f8f4e6 0%, #e8dcc8 50%, #d4c4a8 100%);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 
                1px 1px 3px rgba(0,0,0,0.4),
                2px 2px 5px rgba(0,0,0,0.3),
                inset 1px 1px 2px rgba(255,255,255,0.9);
            border: 1px solid #c9b896;
            transition: all 0.3s ease;
            z-index: 1;
        }
        
        .tile[data-type="bamboo"], .tile[data-type="character"] {
            color: #006400;
        }
        
        .tile[data-type="circle"], .tile[data-type="dragon"] {
            color: #cc0000;
        }
        
        .tile[data-type="wind"], .tile[data-type="flower"] {
            color: #000080;
        }
        
        .tile:hover {
            transform: translateY(-2px);
        }
        
        .tile.selected {
            background: linear-gradient(145deg, #fff8dc 0%, #f0e68c 50%, #daa520 100%);
            box-shadow: 0 0 15px #ffd700, 0 0 30px #ffd700;
            transform: translateY(-3px);
            z-index: 100;
        }
        
        .tile.blocked {
            filter: brightness(0.65);
            cursor: not-allowed;
        }
        
        .tile.matched {
            animation: matchAnim 0.5s ease forwards;
        }
        
        @keyframes matchAnim {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }
        
        /* Кнопки ПОВЕРХ игры */
        .controls-container {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 1000;
            position: relative;
        }
        
        .btn {
            padding: 12px 25px;
            font-size: 14px;
            font-family: 'Noto Sans JP', sans-serif;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 1000;
            position: relative;
        }
        
        .btn-primary {
            background: linear-gradient(145deg, #ffd700 0%, #ffaa00 100%);
            color: #1a472a;
        }
        
        .btn-secondary {
            background: linear-gradient(145deg, #8b4513 0%, #654321 100%);
            color: #fff;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .modal-content {
            background: linear-gradient(145deg, #1a472a 0%, #2d5a3f 100%);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 3px solid #ffd700;
            max-width: 90%;
        }
        
        .modal-title {
            font-size: 32px;
            color: #ffd700;
            margin-bottom: 15px;
        }
        
        .modal-text {
            font-size: 18px;
            color: #fff;
            margin-bottom: 20px;
        }
        
        .hints {
            margin-top: 15px;
            color: #fff;
            font-size: 12px;
            opacity: 0.8;
            text-align: center;
            z-index: 1000;
            position: relative;
        }
        
        .timer {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 10px;
            border: 2px solid #ffd700;
            color: #ffd700;
            font-size: 18px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="game-header">
        <h1 class="title">🀄 Маджонг</h1>
    </div>
    
    <div class="stats">
        <div class="stat-box">
            <div class="stat-label">Счёт</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Пары</div>
            <div class="stat-value" id="pairs">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Время</div>
            <div class="timer" id="timer">00:00</div>
        </div>
    </div>
    
    <div class="game-board" id="board"></div>
    
    <div class="controls-container">
        <button class="btn btn-primary" onclick="shuffleTiles()">Перемешать</button>
        <button class="btn btn-secondary" onclick="resetGame()">Новая игра</button>
        <button class="btn btn-secondary" onclick="showHint()">Подсказка</button>
    </div>
    
    <div class="hints">Нажмите на две одинаковые открытые плитки</div>
    
    <div class="modal" id="winModal">
        <div class="modal-content">
            <div class="modal-title">🎉 Победа!</div>
            <div class="modal-text">Вы очистили все плитки!</div>
            <div class="modal-text">Счёт: <span id="finalScore">0</span></div>
            <div class="modal-text">Время: <span id="finalTime">00:00</span></div>
            <button class="btn btn-primary" onclick="resetGame()">Играть снова</button>
        </div>
    </div>
    
    <div class="modal" id="noMovesModal">
        <div class="modal-content">
            <div class="modal-title">⚠️ Нет ходов!</div>
            <div class="modal-text">Доступных пар не осталось</div>
            <button class="btn btn-primary" onclick="shuffleTiles()">Перемешать</button>
        </div>
    </div>

    <script>
        // === TELEGRAM WEB APP ===
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Адаптация под тему
        if (tg.colorScheme === 'light') {
            document.body.style.background = 'linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #e8f5e9 100%)';
        }
        
        // Главная кнопка
        tg.MainButton.setText('🎮 ИГРАТЬ СНОВА');
        tg.MainButton.setColor('#2d5a3f');
        tg.MainButton.setTextColor('#ffd700');
        
        const tileSymbols = [
            { symbol: '🀀', type: 'wind' }, { symbol: '🀁', type: 'wind' },
            { symbol: '🀂', type: 'wind' }, { symbol: '🀃', type: 'wind' },
            { symbol: '🀄', type: 'dragon' }, { symbol: '🀅', type: 'dragon' },
            { symbol: '🀆', type: 'dragon' },
            { symbol: '🀇', type: 'character' }, { symbol: '🀈', type: 'character' },
            { symbol: '🀉', type: 'character' }, { symbol: '🀊', type: 'character' },
            { symbol: '🀋', type: 'character' }, { symbol: '🀌', type: 'character' },
            { symbol: '🀍', type: 'character' }, { symbol: '🀎', type: 'character' },
            { symbol: '🀏', type: 'character' },
            { symbol: '🀐', type: 'bamboo' }, { symbol: '🀑', type: 'bamboo' },
            { symbol: '🀒', type: 'bamboo' }, { symbol: '🀓', type: 'bamboo' },
            { symbol: '🀔', type: 'bamboo' }, { symbol: '🀕', type: 'bamboo' },
            { symbol: '🀖', type: 'bamboo' }, { symbol: '🀗', type: 'bamboo' },
            { symbol: '🀘', type: 'bamboo' },
            { symbol: '🀙', type: 'circle' }, { symbol: '🀚', type: 'circle' },
            { symbol: '🀛', type: 'circle' }, { symbol: '🀜', type: 'circle' },
            { symbol: '🀝', type: 'circle' }, { symbol: '🀞', type: 'circle' },
            { symbol: '🀟', type: 'circle' }, { symbol: '🀠', type: 'circle' },
            { symbol: '🀡', type: 'circle' }
        ];

        let tiles = [];
        let selectedTile = null;
        let score = 0;
        let pairs = 0;
        let gameStartTime = 0;
        let timerInterval = null;
        let totalPairs = 0;

        function getTilePositions() {
            const positions = [];
            const centerX = 250;
            const centerY = 250;
            
            for (let row = 0; row < 6; row++) {
                for (let col = 0; col < 8; col++) {
                    positions.push({
                        x: centerX + (col - 4) * 45,
                        y: centerY + (row - 3) * 62,
                        z: 0
                    });
                }
            }
            
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 4; col++) {
                    positions.push({
                        x: centerX + (col - 2) * 45 + 22,
                        y: centerY + (row - 1.5) * 62 + 31,
                        z: 1
                    });
                }
            }
            
            positions.push({ x: centerX - 22, y: centerY - 31, z: 2 });
            positions.push({ x: centerX + 22, y: centerY - 31, z: 2 });
            
            return positions;
        }

        function createTiles() {
            const positions = getTilePositions();
            const numPairs = Math.floor(positions.length / 2);
            const selectedSymbols = [];
            
            for (let i = 0; i < numPairs; i++) {
                const tileData = tileSymbols[i % tileSymbols.length];
                selectedSymbols.push({ symbol: tileData.symbol, type: tileData.type });
                selectedSymbols.push({ symbol: tileData.symbol, type: tileData.type });
            }
            
            for (let i = selectedSymbols.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [selectedSymbols[i], selectedSymbols[j]] = [selectedSymbols[j], selectedSymbols[i]];
            }
            
            tiles = positions.map((pos, index) => ({
                id: index,
                x: pos.x,
                y: pos.y,
                z: pos.z,
                symbol: selectedSymbols[index] ? selectedSymbols[index].symbol : '🀀',
                type: selectedSymbols[index] ? selectedSymbols[index].type : 'character',
                element: null,
                removed: false
            }));
            
            totalPairs = numPairs;
        }

        function renderTiles() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            tiles.forEach(tile => {
                if (tile.removed) return;
                
                const element = document.createElement('div');
                element.className = 'tile';
                element.textContent = tile.symbol;
                element.setAttribute('data-type', tile.type);
                element.style.left = tile.x + 'px';
                element.style.top = tile.y + 'px';
                element.style.zIndex = tile.z + 1;
                
                element.addEventListener('click', () => onTileClick(tile));
                
                tile.element = element;
                board.appendChild(element);
            });
            
            updateBlockedStatus();
        }

        function isTileBlocked(tile) {
            const hasTileAbove = tiles.some(t => 
                !t.removed && t.z > tile.z &&
                Math.abs(t.x - tile.x) < 35 &&
                Math.abs(t.y - tile.y) < 50
            );
            
            if (hasTileAbove) return true;
            
            const leftBlocked = tiles.some(t => 
                !t.removed && t.z === tile.z &&
                Math.abs(t.y - tile.y) < 25 &&
                t.x === tile.x - 42
            );
            
            const rightBlocked = tiles.some(t => 
                !t.removed && t.z === tile.z &&
                Math.abs(t.y - tile.y) < 25 &&
                t.x === tile.x + 42
            );
            
            return leftBlocked && rightBlocked;
        }

        function updateBlockedStatus() {
            tiles.forEach(tile => {
                if (tile.element && !tile.removed) {
                    if (isTileBlocked(tile)) {
                        tile.element.classList.add('blocked');
                    } else {
                        tile.element.classList.remove('blocked');
                    }
                }
            });
        }

        function onTileClick(tile) {
            if (tile.removed || isTileBlocked(tile)) return;
            
            if (selectedTile === tile) {
                tile.element.classList.remove('selected');
                selectedTile = null;
                return;
            }
            
            tile.element.classList.add('selected');
            
            if (selectedTile) {
                if (selectedTile.symbol === tile.symbol) {
                    matchTiles(selectedTile, tile);
                    selectedTile = null;
                } else {
                    selectedTile.element.classList.remove('selected');
                    selectedTile = tile;
                }
            } else {
                selectedTile = tile;
            }
        }

        function matchTiles(tile1, tile2) {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
            
            tile1.element.classList.remove('selected');
            tile2.element.classList.remove('selected');
            tile1.element.classList.add('matched');
            tile2.element.classList.add('matched');
            
            setTimeout(() => {
                tile1.removed = true;
                tile2.removed = true;
                if (tile1.element) tile1.element.remove();
                if (tile2.element) tile2.element.remove();
                
                score += 100;
                pairs++;
                updateStats();
                updateBlockedStatus();
                
                if (pairs >= totalPairs) {
                    gameWin();
                } else if (!hasAvailableMoves()) {
                    showNoMovesModal();
                }
            }, 500);
        }

        function hasAvailableMoves() {
            const availableTiles = tiles.filter(t => !t.removed && !isTileBlocked(t));
            for (let i = 0; i < availableTiles.length; i++) {
                for (let j = i + 1; j < availableTiles.length; j++) {
                    if (availableTiles[i].symbol === availableTiles[j].symbol) {
                        return true;
                    }
                }
            }
            return false;
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('pairs').textContent = `${pairs}/${totalPairs}`;
        }

        function startTimer() {
            gameStartTime = Date.now();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
                const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
                const seconds = (elapsed % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${minutes}:${seconds}`;
            }, 1000);
        }

        function gameWin() {
            clearInterval(timerInterval);
            const finalTime = document.getElementById('timer').textContent;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalTime').textContent = finalTime;
            document.getElementById('winModal').style.display = 'flex';
            
            tg.MainButton.show();
            
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
        }

        function showNoMovesModal() {
            document.getElementById('noMovesModal').style.display = 'flex';
        }

        function shuffleTiles() {
            const availableTiles = tiles.filter(t => !t.removed);
            const symbols = availableTiles.map(t => ({ symbol: t.symbol, type: t.type }));
            
            for (let i = symbols.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [symbols[i], symbols[j]] = [symbols[j], symbols[i]];
            }
            
            availableTiles.forEach((tile, index) => {
                tile.symbol = symbols[index].symbol;
                tile.type = symbols[index].type;
                if (tile.element) {
                    tile.element.textContent = tile.symbol;
                    tile.element.setAttribute('data-type', tile.type);
                }
            });
            
            selectedTile = null;
            updateBlockedStatus();
            document.getElementById('noMovesModal').style.display = 'none';
        }

        function resetGame() {
            clearInterval(timerInterval);
            document.getElementById('winModal').style.display = 'none';
            document.getElementById('noMovesModal').style.display = 'none';
            tg.MainButton.hide();
            
            score = 0;
            pairs = 0;
            selectedTile = null;
            
            createTiles();
            renderTiles();
            updateStats();
            startTimer();
        }

        tg.onEvent('mainButtonClicked', () => {
            resetGame();
        });

        resetGame();
    </script>
</body>
</html>
