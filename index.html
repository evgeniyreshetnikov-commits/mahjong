<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🀄 Маджонг</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: linear-gradient(180deg, #1a472a 0%, #2d5a3f 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px;
            min-height: 100vh;
        }
        
        .game-header {
            text-align: center;
            margin-bottom: 5px;
            width: 100%;
        }
        
        .title {
            font-size: 22px;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-weight: bold;
        }
        
        .stats {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 8px;
            width: 100%;
        }
        
        .stat-box {
            background: rgba(255, 255, 255, 0.15);
            padding: 6px 12px;
            border-radius: 8px;
            border: 2px solid #ffd700;
            text-align: center;
            flex: 1;
            max-width: 80px;
        }
        
        .stat-label {
            color: #fff;
            font-size: 10px;
            text-transform: uppercase;
        }
        
        .stat-value {
            color: #ffd700;
            font-size: 16px;
            font-weight: 700;
        }
        
        .timer {
            color: #ffd700;
            font-size: 16px;
            font-weight: 700;
        }
        
        /* Игровое поле - больше для 100+ плиток */
        .game-board {
            position: relative;
            background: #2d5a3f;
            border-radius: 10px;
            padding: 10px;
            border: 3px solid #8b4513;
            width: 100%;
            max-width: 380px;
            height: 520px;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        /* Плитка - КРУПНАЯ */
        .tile {
            position: absolute;
            width: 42px;
            height: 56px;
            background: linear-gradient(145deg, #f8f4e6 0%, #e8dcc8 100%);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 
                2px 2px 4px rgba(0,0,0,0.5),
                3px 3px 6px rgba(0,0,0,0.4);
            border: 1px solid #c9b896;
            z-index: 1;
            transition: transform 0.2s;
        }
        
        .tile[data-type="bamboo"], .tile[data-type="character"] {
            color: #006400;
        }
        
        .tile[data-type="circle"], .tile[data-type="dragon"] {
            color: #cc0000;
        }
        
        .tile[data-type="wind"], .tile[data-type="flower"] {
            color: #000080;
        }
        
        .tile.selected {
            background: #ffd700;
            box-shadow: 0 0 15px #ffd700, 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 100;
            transform: scale(1.08);
        }
        
        .tile.blocked {
            filter: brightness(0.5);
            cursor: not-allowed;
        }
        
        .tile.free {
            filter: brightness(1);
        }
        
        .tile.matched {
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s;
        }
        
        .controls {
            margin-top: 10px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 380px;
            z-index: 1000;
            position: relative;
        }
        
        .btn {
            padding: 10px 14px;
            font-size: 11px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            flex: 1;
            min-width: 90px;
        }
        
        .btn-primary {
            background: linear-gradient(145deg, #ffd700 0%, #ffaa00 100%);
            color: #1a472a;
        }
        
        .btn-secondary {
            background: linear-gradient(145deg, #8b4513 0%, #654321 100%);
            color: #fff;
        }
        
        .hints {
            margin-top: 6px;
            color: #fff;
            font-size: 10px;
            text-align: center;
            opacity: 0.7;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(145deg, #1a472a 0%, #2d5a3f 100%);
            padding: 25px 20px;
            border-radius: 15px;
            text-align: center;
            border: 3px solid #ffd700;
            max-width: 85%;
        }
        
        .modal-title {
            font-size: 24px;
            color: #ffd700;
            margin-bottom: 12px;
            font-weight: bold;
        }
        
        .modal-text {
            font-size: 15px;
            color: #fff;
            margin-bottom: 15px;
        }
        
        /* Адаптация под экраны */
        @media (max-width: 360px) {
            .game-board {
                max-width: 340px;
                height: 480px;
            }
            .tile {
                width: 38px;
                height: 52px;
                font-size: 26px;
            }
        }
        
        @media (max-width: 330px) {
            .game-board {
                max-width: 310px;
                height: 450px;
            }
            .tile {
                width: 36px;
                height: 50px;
                font-size: 24px;
            }
        }
        
        @media (min-height: 750px) {
            .game-board {
                height: 560px;
            }
        }
    </style>
</head>
<body>
    <div class="game-header">
        <h1 class="title">🀄 Маджонг</h1>
    </div>
    
    <div class="stats">
        <div class="stat-box">
            <div class="stat-label">Счёт</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Пары</div>
            <div class="stat-value" id="pairs">0/0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Время</div>
            <div class="timer" id="timer">00:00</div>
        </div>
    </div>
    
    <div class="game-board" id="board"></div>
    
    <div class="controls">
        <button class="btn btn-primary" onclick="shuffleTiles()">Перемешать</button>
        <button class="btn btn-secondary" onclick="resetGame()">Новая игра</button>
        <button class="btn btn-secondary" onclick="showHint()">Подсказка</button>
    </div>
    
    <div class="hints">Нажмите на две одинаковые СВОБОДНЫЕ плитки</div>
    
    <div class="modal" id="winModal">
        <div class="modal-content">
            <div class="modal-title">🎉 Победа!</div>
            <div class="modal-text">Вы очистили все плитки!</div>
            <div class="modal-text">Счёт: <span id="finalScore">0</span></div>
            <div class="modal-text">Время: <span id="finalTime">00:00</span></div>
            <button class="btn btn-primary" onclick="resetGame()">Играть снова</button>
        </div>
    </div>
    
    <div class="modal" id="noMovesModal">
        <div class="modal-content">
            <div class="modal-title">⚠️ Нет ходов!</div>
            <div class="modal-text">Доступных пар не осталось</div>
            <button class="btn btn-primary" onclick="shuffleTiles()">Перемешать</button>
        </div>
    </div>

    <script>
        var tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        if (tg.colorScheme === 'light') {
            document.body.style.background = 'linear-gradient(180deg, #e8f5e9 0%, #c8e6c9 100%)';
        }
        
        tg.MainButton.setText('🎮 ИГРАТЬ СНОВА');
        tg.MainButton.setParams({
            color: '#2d5a3f',
            text_color: '#ffd700'
        });
        
        // 36 уникальных символов × 3 = 108 плиток (54 пары)
        var tileSymbols = [
            { symbol: '🀀', type: 'wind' }, { symbol: '🀁', type: 'wind' },
            { symbol: '🀂', type: 'wind' }, { symbol: '🀃', type: 'wind' },
            { symbol: '🀄', type: 'dragon' }, { symbol: '🀅', type: 'dragon' },
            { symbol: '🀆', type: 'dragon' },
            { symbol: '🀇', type: 'character' }, { symbol: '🀈', type: 'character' },
            { symbol: '🀉', type: 'character' }, { symbol: '🀊', type: 'character' },
            { symbol: '🀋', type: 'character' }, { symbol: '🀌', type: 'character' },
            { symbol: '🀍', type: 'character' }, { symbol: '🀎', type: 'character' },
            { symbol: '🀏', type: 'character' },
            { symbol: '🀐', type: 'bamboo' }, { symbol: '🀑', type: 'bamboo' },
            { symbol: '🀒', type: 'bamboo' }, { symbol: '🀓', type: 'bamboo' },
            { symbol: '🀔', type: 'bamboo' }, { symbol: '🀕', type: 'bamboo' },
            { symbol: '🀖', type: 'bamboo' }, { symbol: '🀗', type: 'bamboo' },
            { symbol: '🀘', type: 'bamboo' },
            { symbol: '🀙', type: 'circle' }, { symbol: '🀚', type: 'circle' },
            { symbol: '🀛', type: 'circle' }, { symbol: '🀜', type: 'circle' },
            { symbol: '🀝', type: 'circle' }, { symbol: '🀞', type: 'circle' },
            { symbol: '🀟', type: 'circle' }, { symbol: '🀠', type: 'circle' },
            { symbol: '🀡', type: 'circle' }
        ];

        var tiles = [];
        var selectedTile = null;
        var score = 0;
        var pairs = 0;
        var gameStartTime = 0;
        var timerInterval = null;
        var totalPairs = 0;
        
        // Размеры плиток
        var tileWidth = 42;
        var tileHeight = 56;
        var tileStepX = 44;
        var tileStepY = 58;
        var padding = 10;

        // Раскладка "Черепаха" - 4 яруса, 108 плиток
        function getTilePositions() {
            var positions = [];
            
            // ЯРУС 0 (база) - 8×6 = 48 плиток
            for (var row = 0; row < 6; row++) {
                for (var col = 0; col < 8; col++) {
                    positions.push({
                        x: padding + col * tileStepX,
                        y: padding + row * tileStepY,
                        z: 0
                    });
                }
            }
            
            // ЯРУС 1 - 6×4 = 24 плитки
            for (var row = 0; row < 4; row++) {
                for (var col = 0; col < 6; col++) {
                    positions.push({
                        x: padding + tileStepX + col * tileStepX,
                        y: padding + tileStepY + row * tileStepY,
                        z: 1
                    });
                }
            }
            
            // ЯРУС 2 - 4×3 = 12 плиток
            for (var row = 0; row < 3; row++) {
                for (var col = 0; col < 4; col++) {
                    positions.push({
                        x: padding + 2 * tileStepX + col * tileStepX,
                        y: padding + 2 * tileStepY + row * tileStepY,
                        z: 2
                    });
                }
            }
            
            // ЯРУС 3 (вершина) - 4×2 = 8 плиток
            for (var row = 0; row < 2; row++) {
                for (var col = 0; col < 4; col++) {
                    positions.push({
                        x: padding + 2.5 * tileStepX + col * tileStepX,
                        y: padding + 3 * tileStepY + row * tileStepY,
                        z: 3
                    });
                }
            }
            
            // ЯРУС 4 (пик) - 2×2 = 4 плитки
            positions.push({ x: padding + 3 * tileStepX, y: padding + 4 * tileStepY, z: 4 });
            positions.push({ x: padding + 4 * tileStepX, y: padding + 4 * tileStepY, z: 4 });
            positions.push({ x: padding + 3 * tileStepX, y: padding + 4.5 * tileStepY, z: 4 });
            positions.push({ x: padding + 4 * tileStepX, y: padding + 4.5 * tileStepY, z: 4 });
            
            // Крылья по бокам (добавочные)
            positions.push({ x: padding - tileStepX, y: padding + 2.5 * tileStepY, z: 0 });
            positions.push({ x: padding + 8 * tileStepX, y: padding + 2.5 * tileStepY, z: 0 });
            positions.push({ x: padding - tileStepX, y: padding + 3.5 * tileStepY, z: 0 });
            positions.push({ x: padding + 8 * tileStepX, y: padding + 3.5 * tileStepY, z: 0 });
            
            return positions;
        }

        function createTiles() {
            var positions = getTilePositions();
            var numPairs = Math.floor(positions.length / 2);
            var selectedSymbols = [];
            
            // Берём символы циклично для 100+ плиток
            for (var i = 0; i < numPairs; i++) {
                var tileData = tileSymbols[i % tileSymbols.length];
                selectedSymbols.push({ symbol: tileData.symbol, type: tileData.type });
                selectedSymbols.push({ symbol: tileData.symbol, type: tileData.type });
            }
            
            // Перемешивание Фишера-Йетса
            for (var i = selectedSymbols.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = selectedSymbols[i];
                selectedSymbols[i] = selectedSymbols[j];
                selectedSymbols[j] = temp;
            }
            
            tiles = positions.map(function(pos, index) {
                return {
                    id: index,
                    x: pos.x,
                    y: pos.y,
                    z: pos.z,
                    symbol: selectedSymbols[index] ? selectedSymbols[index].symbol : '🀀',
                    type: selectedSymbols[index] ? selectedSymbols[index].type : 'character',
                    element: null,
                    removed: false
                };
            });
            
            totalPairs = numPairs;
        }

        function renderTiles() {
            var board = document.getElementById('board');
            if (!board) return;
            
            board.innerHTML = '';
            
            tiles.forEach(function(tile) {
                if (tile.removed) return;
                
                var element = document.createElement('div');
                element.className = 'tile';
                element.textContent = tile.symbol;
                element.setAttribute('data-type', tile.type);
                element.style.width = tileWidth + 'px';
                element.style.height = tileHeight + 'px';
                element.style.fontSize = (tileWidth * 0.65) + 'px';
                element.style.left = tile.x + 'px';
                element.style.top = tile.y + 'px';
                element.style.zIndex = tile.z + 1;
                
                element.addEventListener('click', function() {
                    onTileClick(tile);
                });
                
                tile.element = element;
                board.appendChild(element);
            });
            
            setTimeout(function() {
                updateBlockedStatus();
            }, 50);
        }

        // ПРОВЕРКА: плитка свободна только если:
        // 1. Нет плитки НАД ней (сверху по Z)
        // 2. Свободна ЛЕВАЯ или ПРАВАЯ сторона
        function isTileFree(tile) {
            // Проверяем есть ли плитка сверху (на более высоком ярусе)
            var hasTileAbove = tiles.some(function(t) {
                if (t.removed || t.z <= tile.z) return false;
                
                // Плитка сверху перекрывает эту
                var overlapX = Math.abs(t.x - tile.x) < tileWidth - 10;
                var overlapY = Math.abs(t.y - tile.y) < tileHeight - 10;
                
                return overlapX && overlapY;
            });
            
            if (hasTileAbove) return false; // Заблокирована плиткой сверху
            
            // Проверяем левую сторону
            var leftBlocked = tiles.some(function(t) {
                if (t.removed || t.z !== tile.z) return false;
                
                var sameRow = Math.abs(t.y - tile.y) < 20;
                var onLeft = t.x === tile.x - tileWidth;
                
                return sameRow && onLeft;
            });
            
            // Проверяем правую сторону
            var rightBlocked = tiles.some(function(t) {
                if (t.removed || t.z !== tile.z) return false;
                
                var sameRow = Math.abs(t.y - tile.y) < 20;
                var onRight = t.x === tile.x + tileWidth;
                
                return sameRow && onRight;
            });
            
            // Свободна если хотя бы одна сторона открыта
            return !leftBlocked || !rightBlocked;
        }

        function updateBlockedStatus() {
            tiles.forEach(function(tile) {
                if (tile.element && !tile.removed) {
                    if (isTileFree(tile)) {
                        tile.element.classList.remove('blocked');
                        tile.element.classList.add('free');
                    } else {
                        tile.element.classList.add('blocked');
                        tile.element.classList.remove('free');
                    }
                }
            });
        }

        function onTileClick(tile) {
            // Нельзя кликать заблокированные плитки
            if (tile.removed || !isTileFree(tile)) {
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('error');
                }
                return;
            }
            
            // Снимаем выделение с той же плитки
            if (selectedTile === tile) {
                tile.element.classList.remove('selected');
                selectedTile = null;
                return;
            }
            
            tile.element.classList.add('selected');
            
            if (selectedTile) {
                // Проверяем совпадение
                if (selectedTile.symbol === tile.symbol) {
                    matchTiles(selectedTile, tile);
                    selectedTile = null;
                } else {
                    // Нет совпадения - переключаем выделение
                    selectedTile.element.classList.remove('selected');
                    selectedTile = tile;
                }
            } else {
                selectedTile = tile;
            }
        }

        function matchTiles(tile1, tile2) {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
            
            tile1.element.classList.remove('selected');
            tile2.element.classList.remove('selected');
            tile1.element.classList.add('matched');
            tile2.element.classList.add('matched');
            
            setTimeout(function() {
                tile1.removed = true;
                tile2.removed = true;
                if (tile1.element && tile1.element.parentNode) {
                    tile1.element.parentNode.removeChild(tile1.element);
                }
                if (tile2.element && tile2.element.parentNode) {
                    tile2.element.parentNode.removeChild(tile2.element);
                }
                
                score += 100;
                pairs++;
                updateStats();
                updateBlockedStatus();
                
                if (pairs >= totalPairs) {
                    gameWin();
                } else if (!hasAvailableMoves()) {
                    showNoMovesModal();
                }
            }, 300);
        }

        function hasAvailableMoves() {
            var freeTiles = tiles.filter(function(t) {
                return !t.removed && isTileFree(t);
            });
            
            for (var i = 0; i < freeTiles.length; i++) {
                for (var j = i + 1; j < freeTiles.length; j++) {
                    if (freeTiles[i].symbol === freeTiles[j].symbol) {
                        return true;
                    }
                }
            }
            return false;
        }

        function updateStats() {
            var scoreEl = document.getElementById('score');
            var pairsEl = document.getElementById('pairs');
            if (scoreEl) scoreEl.textContent = score;
            if (pairsEl) pairsEl.textContent = pairs + '/' + totalPairs;
        }

        function startTimer() {
            gameStartTime = Date.now();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(function() {
                var elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
                var minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
                var seconds = (elapsed % 60).toString().padStart(2, '0');
                var timerEl = document.getElementById('timer');
                if (timerEl) timerEl.textContent = minutes + ':' + seconds;
            }, 1000);
        }

        function gameWin() {
            clearInterval(timerInterval);
            var finalTime = document.getElementById('timer').textContent;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalTime').textContent = finalTime;
            document.getElementById('winModal').classList.add('show');
            
            tg.MainButton.show();
            
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
        }

        function showNoMovesModal() {
            document.getElementById('noMovesModal').classList.add('show');
        }

        function shuffleTiles() {
            var freeTiles = tiles.filter(function(t) {
                return !t.removed && isTileFree(t);
            });
            var symbols = freeTiles.map(function(t) {
                return { symbol: t.symbol, type: t.type };
            });
            
            for (var i = symbols.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = symbols[i];
                symbols[i] = symbols[j];
                symbols[j] = temp;
            }
            
            freeTiles.forEach(function(tile, index) {
                tile.symbol = symbols[index].symbol;
                tile.type = symbols[index].type;
                if (tile.element) {
                    tile.element.textContent = tile.symbol;
                    tile.element.setAttribute('data-type', tile.type);
                }
            });
            
            selectedTile = null;
            updateBlockedStatus();
            document.getElementById('noMovesModal').classList.remove('show');
        }

        function resetGame() {
            clearInterval(timerInterval);
            document.getElementById('winModal').classList.remove('show');
            document.getElementById('noMovesModal').classList.remove('show');
            tg.MainButton.hide();
            
            score = 0;
            pairs = 0;
            selectedTile = null;
            
            tiles = [];
            createTiles();
            renderTiles();
            updateStats();
            startTimer();
        }

        tg.MainButton.onClick(function() {
            resetGame();
        });

        window.addEventListener('load', function() {
            setTimeout(function() {
                resetGame();
            }, 100);
        });
    </script>
</body>
</html>
