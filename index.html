<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🀄 Маджонг</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #1a472a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }
        
        .game-header {
            text-align: center;
            margin-bottom: 10px;
            width: 100%;
        }
        
        .title {
            font-size: 28px;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .stats {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            width: 100%;
        }
        
        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 8px;
            border: 2px solid #ffd700;
            text-align: center;
        }
        
        .stat-label {
            color: #fff;
            font-size: 11px;
            text-transform: uppercase;
        }
        
        .stat-value {
            color: #ffd700;
            font-size: 18px;
            font-weight: 700;
        }
        
        .timer {
            color: #ffd700;
            font-size: 18px;
            font-weight: 700;
        }
        
        /* Игровое поле с фиксированными размерами */
        .game-board {
            position: relative;
            background: #2d5a3f;
            border-radius: 10px;
            padding: 15px;
            border: 3px solid #8b4513;
            width: 340px;
            height: 380px;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        /* Плитки */
        .tile {
            position: absolute;
            width: 38px;
            height: 52px;
            background: linear-gradient(145deg, #f8f4e6 0%, #e8dcc8 100%);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            cursor: pointer;
            box-shadow: 
                1px 1px 2px rgba(0,0,0,0.3),
                2px 2px 4px rgba(0,0,0,0.2);
            border: 1px solid #c9b896;
            z-index: 1;
        }
        
        .tile[data-type="bamboo"], .tile[data-type="character"] {
            color: #006400;
        }
        
        .tile[data-type="circle"], .tile[data-type="dragon"] {
            color: #cc0000;
        }
        
        .tile[data-type="wind"], .tile[data-type="flower"] {
            color: #000080;
        }
        
        .tile.selected {
            background: #ffd700;
            box-shadow: 0 0 10px #ffd700;
            z-index: 100;
        }
        
        .tile.blocked {
            filter: brightness(0.6);
            cursor: not-allowed;
        }
        
        .tile.matched {
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        /* Кнопки */
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            z-index: 1000;
        }
        
        .btn {
            padding: 10px 18px;
            font-size: 13px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
        }
        
        .btn-primary {
            background: #ffd700;
            color: #1a472a;
        }
        
        .btn-secondary {
            background: #8b4513;
            color: #fff;
        }
        
        .hints {
            margin-top: 10px;
            color: #fff;
            font-size: 11px;
            text-align: center;
            opacity: 0.8;
        }
        
        /* Модальные окна */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: #1a472a;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 3px solid #ffd700;
            max-width: 85%;
        }
        
        .modal-title {
            font-size: 26px;
            color: #ffd700;
            margin-bottom: 12px;
        }
        
        .modal-text {
            font-size: 16px;
            color: #fff;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="game-header">
        <h1 class="title">🀄 Маджонг</h1>
    </div>
    
    <div class="stats">
        <div class="stat-box">
            <div class="stat-label">Счёт</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Пары</div>
            <div class="stat-value" id="pairs">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Время</div>
            <div class="timer" id="timer">00:00</div>
        </div>
    </div>
    
    <div class="game-board" id="board"></div>
    
    <div class="controls">
        <button class="btn btn-primary" onclick="shuffleTiles()">Перемешать</button>
        <button class="btn btn-secondary" onclick="resetGame()">Новая игра</button>
        <button class="btn btn-secondary" onclick="showHint()">Подсказка</button>
    </div>
    
    <div class="hints">Нажмите на две одинаковые плитки</div>
    
    <div class="modal" id="winModal">
        <div class="modal-content">
            <div class="modal-title">🎉 Победа!</div>
            <div class="modal-text">Счёт: <span id="finalScore">0</span></div>
            <div class="modal-text">Время: <span id="finalTime">00:00</span></div>
            <button class="btn btn-primary" onclick="resetGame()">Играть снова</button>
        </div>
    </div>
    
    <div class="modal" id="noMovesModal">
        <div class="modal-content">
            <div class="modal-title">⚠️ Нет ходов!</div>
            <button class="btn btn-primary" onclick="shuffleTiles()">Перемешать</button>
        </div>
    </div>

    <script>
        // Инициализация Telegram
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Адаптация под тему
        if (tg.colorScheme === 'light') {
            document.body.style.background = '#e8f5e9';
        }
        
        // Кнопка Telegram
        tg.MainButton.setText('🎮 ИГРАТЬ СНОВА');
        tg.MainButton.setColor('#2d5a3f');
        tg.MainButton.setTextColor('#ffd700');
        
        const tileSymbols = [
            { symbol: '🀀', type: 'wind' }, { symbol: '🀁', type: 'wind' },
            { symbol: '🀂', type: 'wind' }, { symbol: '🀃', type: 'wind' },
            { symbol: '🀄', type: 'dragon' }, { symbol: '🀅', type: 'dragon' },
            { symbol: '🀆', type: 'dragon' },
            { symbol: '🀇', type: 'character' }, { symbol: '🀈', type: 'character' },
            { symbol: '🀉', type: 'character' }, { symbol: '🀊', type: 'character' },
            { symbol: '🀋', type: 'character' }, { symbol: '🀌', type: 'character' },
            { symbol: '🀍', type: 'character' }, { symbol: '🀎', type: 'character' },
            { symbol: '🀏', type: 'character' },
            { symbol: '🀐', type: 'bamboo' }, { symbol: '🀑', type: 'bamboo' },
            { symbol: '🀒', type: 'bamboo' }, { symbol: '🀓', type: 'bamboo' },
            { symbol: '🀔', type: 'bamboo' }, { symbol: '🀕', type: 'bamboo' },
            { symbol: '🀖', type: 'bamboo' }, { symbol: '🀗', type: 'bamboo' },
            { symbol: '🀘', type: 'bamboo' },
            { symbol: '🀙', type: 'circle' }, { symbol: '🀚', type: 'circle' },
            { symbol: '🀛', type: 'circle' }, { symbol: '🀜', type: 'circle' },
            { symbol: '🀝', type: 'circle' }, { symbol: '🀞', type: 'circle' },
            { symbol: '🀟', type: 'circle' }, { symbol: '🀠', type: 'circle' },
            { symbol: '🀡', type: 'circle' }
        ];

        let tiles = [];
        let selectedTile = null;
        let score = 0;
        let pairs = 0;
        let gameStartTime = 0;
        let timerInterval = null;
        let totalPairs = 0;

        // Упрощённая раскладка для мобильных
        function getTilePositions() {
            const positions = [];
            const centerX = 170;
            const centerY = 190;
            
            // Слой 0 - 8x5
            for (let row = 0; row < 5; row++) {
                for (let col = 0; col < 8; col++) {
                    positions.push({
                        x: 20 + col * 42,
                        y: 20 + row * 56,
                        z: 0
                    });
                }
            }
            
            // Слой 1 - 4x2
            for (let row = 0; row < 2; row++) {
                for (let col = 0; col < 4; col++) {
                    positions.push({
                        x: 60 + col * 42,
                        y: 70 + row * 56,
                        z: 1
                    });
                }
            }
            
            // Слой 2 - вершина
            positions.push({ x: 100, y: 140, z: 2 });
            positions.push({ x: 142, y: 140, z: 2 });
            
            return positions;
        }

        function createTiles() {
            const positions = getTilePositions();
            const numPairs = Math.floor(positions.length / 2);
            const selectedSymbols = [];
            
            for (let i = 0; i < numPairs; i++) {
                const tileData = tileSymbols[i % tileSymbols.length];
                selectedSymbols.push({ symbol: tileData.symbol, type: tileData.type });
                selectedSymbols.push({ symbol: tileData.symbol, type: tileData.type });
            }
            
            // Перемешивание
            for (let i = selectedSymbols.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [selectedSymbols[i], selectedSymbols[j]] = [selectedSymbols[j], selectedSymbols[i]];
            }
            
            tiles = positions.map((pos, index) => ({
                id: index,
                x: pos.x,
                y: pos.y,
                z: pos.z,
                symbol: selectedSymbols[index] ? selectedSymbols[index].symbol : '🀀',
                type: selectedSymbols[index] ? selectedSymbols[index].type : 'character',
                element: null,
                removed: false
            }));
            
            totalPairs = numPairs;
        }

        function renderTiles() {
            const board = document.getElementById('board');
            if (!board) return;
            
            board.innerHTML = '';
            
            tiles.forEach(tile => {
                if (tile.removed) return;
                
                const element = document.createElement('div');
                element.className = 'tile';
                element.textContent = tile.symbol;
                element.setAttribute('data-type', tile.type);
                element.style.left = tile.x + 'px';
                element.style.top = tile.y + 'px';
                element.style.zIndex = tile.z + 1;
                
                element.addEventListener('click', function() {
                    onTileClick(tile);
                });
                
                tile.element = element;
                board.appendChild(element);
            });
            
            // Небольшая задержка для обновления
            setTimeout(function() {
                updateBlockedStatus();
            }, 50);
        }

        function isTileBlocked(tile) {
            const hasTileAbove = tiles.some(t => 
                !t.removed && t.z > tile.z &&
                Math.abs(t.x - tile.x) < 30 &&
                Math.abs(t.y - tile.y) < 45
            );
            
            if (hasTileAbove) return true;
            
            const leftBlocked = tiles.some(t => 
                !t.removed && t.z === tile.z &&
                Math.abs(t.y - tile.y) < 20 &&
                t.x === tile.x - 38
            );
            
            const rightBlocked = tiles.some(t => 
                !t.removed && t.z === tile.z &&
                Math.abs(t.y - tile.y) < 20 &&
                t.x === tile.x + 38
            );
            
            return leftBlocked && rightBlocked;
        }

        function updateBlockedStatus() {
            tiles.forEach(tile => {
                if (tile.element && !tile.removed) {
                    if (isTileBlocked(tile)) {
                        tile.element.classList.add('blocked');
                    } else {
                        tile.element.classList.remove('blocked');
                    }
                }
            });
        }

        function onTileClick(tile) {
            if (tile.removed || isTileBlocked(tile)) return;
            
            if (selectedTile === tile) {
                tile.element.classList.remove('selected');
                selectedTile = null;
                return;
            }
            
            tile.element.classList.add('selected');
            
            if (selectedTile) {
                if (selectedTile.symbol === tile.symbol) {
                    matchTiles(selectedTile, tile);
                    selectedTile = null;
                } else {
                    selectedTile.element.classList.remove('selected');
                    selectedTile = tile;
                }
            } else {
                selectedTile = tile;
            }
        }

        function matchTiles(tile1, tile2) {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
            
            tile1.element.classList.remove('selected');
            tile2.element.classList.remove('selected');
            tile1.element.classList.add('matched');
            tile2.element.classList.add('matched');
            
            setTimeout(function() {
                tile1.removed = true;
                tile2.removed = true;
                if (tile1.element && tile1.element.parentNode) {
                    tile1.element.parentNode.removeChild(tile1.element);
                }
                if (tile2.element && tile2.element.parentNode) {
                    tile2.element.parentNode.removeChild(tile2.element);
                }
                
                score += 100;
                pairs++;
                updateStats();
                updateBlockedStatus();
                
                if (pairs >= totalPairs) {
                    gameWin();
                } else if (!hasAvailableMoves()) {
                    showNoMovesModal();
                }
            }, 300);
        }

        function hasAvailableMoves() {
            const availableTiles = tiles.filter(t => !t.removed && !isTileBlocked(t));
            for (let i = 0; i < availableTiles.length; i++) {
                for (let j = i + 1; j < availableTiles.length; j++) {
                    if (availableTiles[i].symbol === availableTiles[j].symbol) {
                        return true;
                    }
                }
            }
            return false;
        }

        function updateStats() {
            const scoreEl = document.getElementById('score');
            const pairsEl = document.getElementById('pairs');
            if (scoreEl) scoreEl.textContent = score;
            if (pairsEl) pairsEl.textContent = pairs + '/' + totalPairs;
        }

        function startTimer() {
            gameStartTime = Date.now();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(function() {
                const elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
                const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
                const seconds = (elapsed % 60).toString().padStart(2, '0');
                const timerEl = document.getElementById('timer');
                if (timerEl) timerEl.textContent = minutes + ':' + seconds;
            }, 1000);
        }

        function gameWin() {
            clearInterval(timerInterval);
            const finalTime = document.getElementById('timer').textContent;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalTime').textContent = finalTime;
            document.getElementById('winModal').classList.add('show');
            
            tg.MainButton.show();
            
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
        }

        function showNoMovesModal() {
            document.getElementById('noMovesModal').classList.add('show');
        }

        function shuffleTiles() {
            const availableTiles = tiles.filter(t => !t.removed);
            const symbols = availableTiles.map(t => ({ symbol: t.symbol, type: t.type }));
            
            for (let i = symbols.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [symbols[i], symbols[j]] = [symbols[j], symbols[i]];
            }
            
            availableTiles.forEach(function(tile, index) {
                tile.symbol = symbols[index].symbol;
                tile.type = symbols[index].type;
                if (tile.element) {
                    tile.element.textContent = tile.symbol;
                    tile.element.setAttribute('data-type', tile.type);
                }
            });
            
            selectedTile = null;
            updateBlockedStatus();
            document.getElementById('noMovesModal').classList.remove('show');
        }

        function resetGame() {
            clearInterval(timerInterval);
            document.getElementById('winModal').classList.remove('show');
            document.getElementById('noMovesModal').classList.remove('show');
            tg.MainButton.hide();
            
            score = 0;
            pairs = 0;
            selectedTile = null;
            
            tiles = [];
            createTiles();
            renderTiles();
            updateStats();
            startTimer();
        }

        tg.onEvent('mainButtonClicked', function() {
            resetGame();
        });

        // Запуск после полной загрузки
        window.addEventListener('load', function() {
            setTimeout(function() {
                resetGame();
            }, 100);
        });
    </script>
</body>
</html>
